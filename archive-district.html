<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울아카이브 - 자치구별 재산 목록</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body id="page-archive-district">

    <div id="header-plugin"></div>

    <div class="container mt-4 archive-main">
        <div class="mb-2">
            <h2 class="mb-0 archive-list-page-title">자치구별 재산 목록</h2>
        </div>
        <div class="text-muted small mb-3">※ 단위가 없는 경우에는 (천원)을 의미하며 채무(부채)는 총계 산정 시 감산 처리됩니다.</div>

        <div id="district-filter-section" class="d-flex justify-content-center align-items-center flex-wrap gap-2 mb-4" style="display: none;" aria-label="자치구 선택">
            <label for="district-select" class="small text-muted mb-0">자치구</label>
            <select id="district-select" class="form-select form-select-sm" style="max-width: 200px;"></select>
        </div>

        <div id="district-summary-section" class="row mb-4" style="display: none;">
            <div class="col-md-4 mb-3">
                <div class="card bg-light border-0 shadow-sm p-3 h-100 text-center">
                    <small class="text-muted fw-bold mb-2 d-block">해당 구 재산 합계 (2026)</small>
                    <div id="district-stat-total" class="fs-4 fw-bold text-danger">-</div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card bg-light border-0 shadow-sm p-3 h-100 text-center">
                    <small class="text-muted fw-bold mb-2 d-block">부동산 합계 (토지+건물, 2026)</small>
                    <div id="district-stat-realestate" class="fs-4 fw-bold text-danger">-</div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card bg-light border-0 shadow-sm p-3 h-100 text-center">
                    <small class="text-muted fw-bold mb-2 d-block">금융자산 합계 (현금·예금·증권, 2026)</small>
                    <div id="district-stat-finance" class="fs-4 fw-bold text-danger">-</div>
                </div>
            </div>
        </div>

        <div id="loading" class="text-center my-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">데이터를 불러오는 중입니다...</p>
        </div>

        <div id="list-section" style="display: none;">
            <div class="table-responsive">
                <table id="analysisTable" class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>자치구</th>
                            <th>직위</th>
                            <th>성명</th>
                            <th class="text-end">2026년</th>
                            <th class="text-center">증감율</th>
                            <th class="text-end">2025년</th>
                            <th class="text-center">증감율</th>
                            <th class="text-end">2024년</th>
                            <th class="text-center">증감율</th>
                            <th class="text-end">2023년</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="footer-plugin"></div>

    <div class="modal fade" id="detailModal" tabindex="-1" aria-labelledby="detailModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="detailModalLabel">의원 상세 정보</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-4" style="height: 250px;">
                        <canvas id="detailChart"></canvas>
                    </div>
                    <div class="text-muted small mb-2">단위: 천원 (채무/부채는 총계에서 감산)</div>
                    <div id="detailContent"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

    <script src="chart.js"></script>
    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script src="script.js"></script>

</body>
</html>
