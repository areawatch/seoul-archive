<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울아카이브 | 프로젝트 소개</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-plugin"></div>

    <main class="container py-5 intro-page" aria-label="프로젝트 소개">
    </main>

    <div id="footer-plugin"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadComponent(id, file) {
            try {
                const response = await fetch(file);
                if (!response.ok) return;
                const data = await response.text();
                const container = document.getElementById(id);
                if (container) {
                    container.innerHTML = data;
                    if (id === 'header-plugin') {
                        const nav = container.querySelector('nav');
                        if (nav) { nav.classList.remove('mb-4'); nav.classList.add('mb-0'); }
                    }
                }
            } catch (err) { console.error(file + " 로드 실패:", err); }
        }

        window.addEventListener('DOMContentLoaded', async () => {
            await loadComponent('header-plugin', 'header.html');
            await loadComponent('footer-plugin', 'footer.html');
        });
    </script>
</body>
</html>
