# 서울 구의원·구청장 예비후보 명부 (NEC) → public/data/candidates.json
# 스케줄은 UTC 기준입니다. 한국은 일광절이 없어 KST = UTC+9 고정.
name: Crawl NEC candidates (Seoul)

on:
  workflow_dispatch: {}
  schedule:
    # 매일 09:00 KST = 00:00 UTC
    - cron: "0 0 * * *"

permissions:
  contents: write

concurrency:
  group: crawl-candidates
  cancel-in-progress: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # Node 20 기반 액션 deprecation 경고 완화 (https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-crawl.txt

      - name: Install dependencies
        run: pip install -r requirements-crawl.txt

      - name: Run crawl
        run: python crawl_candidates.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- public/data/candidates.json; then
            echo "No changes to candidates.json"
            exit 0
          fi
          git add public/data/candidates.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "자동 갱신: 예비후보 명부 (candidates.json)"
          git push
