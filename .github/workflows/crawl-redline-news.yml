# RED LINE 뉴스 링크 OG 제목 캐시 갱신
name: Crawl RED LINE news titles

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: crawl-redline-news
  cancel-in-progress: true

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-crawl.txt

      - name: Install dependencies
        run: pip install -r requirements-crawl.txt

      - name: Run RED LINE news crawl
        run: python crawl_candidates.py --task news

      - name: Commit if changed
        run: |
          if git diff --quiet -- public/data/redline-news-cache.json; then
            echo "No changes to redline-news-cache.json"
            exit 0
          fi
          git add public/data/redline-news-cache.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "자동 갱신: RED LINE 뉴스 OG 캐시"
          git push
