<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울아카이브 | 공직자 재산 투명성 프로젝트</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="header-plugin"></div>

    <section class="hero-section">
        <div class="container text-center">
            <h1 class="display-4 fw-bold mb-3 hero-title">내 동네 공직자의 재산,<br><strong>얼마나 변했을까요?</strong></h1>
            <p class="lead mb-4 text-secondary" style="opacity: 0.8;">서울시 구청장 및 구의원 450여 명의 4개년 재산 데이터를 한눈에 확인하세요.</p>
            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <a href="archive.html" class="btn btn-primary btn-lg px-4 gap-3 shadow-sm">재산 목록 바로가기</a>
                <a href="#about" class="btn btn-outline-light btn-lg px-4">프로젝트 소개</a>
            </div>
        </div>
    </section>

    <main class="py-5">
        <div class="container">
            <div class="row g-4 mb-5 text-center">
                <div class="col-md-4">
                    <div class="card h-100 p-4 stat-card shadow-sm">
                        <div class="text-muted small mb-2">데이터 분석 규모</div>
                        <h2 class="fw-bold"><span id="total-count">0</span>명</h2>
                        <p class="mb-0 text-secondary small">
                            구청장(전현직 포함) <span id="mayor-count">0</span>명 + 구의원(전현직 포함) <span id="member-count">0</span>명
                        </p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100 p-4 stat-card shadow-sm">
                        <div class="text-muted small mb-2">2026년 재산 총합</div>
                        <h2 class="fw-bold text-danger"><span id="total-wealth">0</span></h2>
                        <p class="mb-0 text-secondary small">
                            구청장 <span id="mayor-total">0</span> / 구의원 <span id="member-total">0</span>
                        </p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100 p-4 stat-card shadow-sm border-0" style="background: linear-gradient(145deg, #ffffff, #f8f9fa);">
                        <div class="text-muted small mb-2">공직자 평균 부동산 자산</div>
                        <h2 class="fw-bold text-dark" style="letter-spacing: -1px;">
                            <span id="avg-real-estate">0</span>
                        </h2>
                        <p class="mb-0 mt-2">
                            <span class="badge bg-warning text-dark">분석 결과</span> 
                            <span class="small text-secondary d-block mt-1">
                                서울 시민 평균보다 <b id="re-ratio" class="text-dark">0.0</b>배 많음
                            </span>
                        </p>
                    </div>
                </div>  
            </div>
        </div>
    </main>

    <div id="footer-plugin"></div>

    <script>
        // 기준값: 서울 시민 가구당 평균 부동산 자산 (5억 5천만 원 설정)
        const SEOUL_AVG_RE_MAN = 55000;

        async function loadComponent(id, file) {
            try {
                const response = await fetch(file);
                if (!response.ok) return;
                const data = await response.text();
                const container = document.getElementById(id);
                if (container) {
                    container.innerHTML = data;
                    if (id === 'header-plugin') {
                        const nav = container.querySelector('nav');
                        if (nav) { nav.classList.remove('mb-4'); nav.classList.add('mb-0'); }
                    }
                }
            } catch (err) { console.error(file + " 로드 실패:", err); }
        }

        function formatKoreanUnit(manValue) {
            if (manValue === 0) return "0만";
            const sign = manValue < 0 ? "-" : "";
            let absVal = Math.abs(Math.round(manValue));
            
            const jo = Math.floor(absVal / 100000000); 
            const eok = Math.floor((absVal % 100000000) / 10000);
            const man = absVal % 10000;

            let result = "";
            if (jo > 0) result += `${jo}조 `;
            if (eok > 0) result += `${eok}억 `;
            if (man > 0 || result === "") result += `${man}만`;
            
            return sign + result.trim();
        }

        function animateValue(id, start, end, duration, isKorean = false, prefix = "") {
            const obj = document.getElementById(id);
            if (!obj) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const current = progress * (end - start) + start;
                
                if (isKorean) {
                    obj.innerHTML = prefix + formatKoreanUnit(current);
                } else {
                    obj.innerText = prefix + Math.floor(current).toLocaleString();
                }

                if (progress < 1) { window.requestAnimationFrame(step); }
            };
            window.requestAnimationFrame(step);
        }

        function renderStats(allData) {
            const data = Object.values(allData);
            
            // 2026년 데이터가 있는 현직자만 필터링
            const activeData = data.filter(i => Number(i.y2026) > 0);
            const activeMayors = activeData.filter(i => i.position && i.position.includes("구청장"));
            const activeMembers = activeData.filter(i => i.position && !i.position.includes("구청장"));

            const duration = 1500;
            const toMan = (cheon) => cheon / 10;

            // 1. 인원수 반영
            animateValue("total-count", 0, data.length, duration);
            document.getElementById('mayor-count').innerText = data.filter(i => i.position.includes("구청장")).length;
            document.getElementById('member-count').innerText = data.filter(i => !i.position.includes("구청장")).length;

            // 2. 재산 총합
            const sumMayorCheon = activeMayors.reduce((acc, cur) => acc + (Number(cur.y2026) || 0), 0);
            const sumMemberCheon = activeMembers.reduce((acc, cur) => acc + (Number(cur.y2026) || 0), 0);
            const sumTotalMan = toMan(sumMayorCheon + sumMemberCheon);
            
            animateValue("total-wealth", 0, sumTotalMan, duration, true);
            document.getElementById('mayor-total').innerHTML = formatKoreanUnit(toMan(sumMayorCheon));
            document.getElementById('member-total').innerHTML = formatKoreanUnit(toMan(sumMemberCheon));

            // 3. 평균 부동산 자산 계산 (토지 + 건물)
            const getAvgRealEstateMan = (arr) => {
                if (arr.length === 0) return 0;
                const totalRECheon = arr.reduce((acc, cur) => {
                    return acc + (Number(cur.land2026) || 0) + (Number(cur.building2026) || 0);
                }, 0);
                return toMan(totalRECheon / arr.length);
            };

            const avgREMan = getAvgRealEstateMan(activeData);
            
            // 배수 계산 (예: 공직자 평균 13억 / 서울시민 5.5억 = 약 2.4배)
            const ratio = (avgREMan / SEOUL_AVG_RE_MAN).toFixed(1);

            // 애니메이션 실행
            animateValue("avg-real-estate", 0, avgREMan, duration, true);
            document.getElementById('re-ratio').innerText = ratio;
        }

        async function init() {
            await loadComponent('header-plugin', 'header.html');
            await loadComponent('footer-plugin', 'footer.html');

            try {
                const response = await fetch('data.json?v=' + Date.now());
                if (!response.ok) throw new Error("JSON 파일을 찾을 수 없습니다.");
                const data = await response.json();
                console.log("✅ 데이터 로드 성공");
                renderStats(data);
            } catch (err) { 
                console.error("데이터 초기화 에러:", err); 
            }
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
