<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울아카이브 - 의원 재산 현황</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="header-plugin"></div>

    <div class="container mt-4">
        <h2 class="mb-4 fw-bold">의원 재산 목록</h2>

        <div id="highlight-section" class="row mb-4" style="display: none;">
            <div class="col-md-3 mb-3">
                <div class="card bg-light border-0 shadow-sm p-3 h-100">
                    <small class="text-muted fw-bold mb-2 d-block text-center">최고 재산가 TOP 5</small>
                    <div id="max-wealth-list" class="list-group list-group-flush bg-transparent"></div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card bg-light border-0 shadow-sm p-3 h-100">
                    <small class="text-muted fw-bold mb-2 d-block text-center">최고 증감률 TOP 5</small>
                    <div id="max-growth-list" class="list-group list-group-flush bg-transparent"></div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card bg-light border-0 shadow-sm p-3 h-100">
                    <small class="text-muted fw-bold mb-2 d-block text-center">토지 재산 TOP 5</small>
                    <div id="max-land-list" class="list-group list-group-flush bg-transparent"></div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card bg-light border-0 shadow-sm p-3 h-100">
                    <small class="text-muted fw-bold mb-2 d-block text-center">건물 재산 TOP 5</small>
                    <div id="max-building-list" class="list-group list-group-flush bg-transparent"></div>
                </div>
            </div>
        </div>

        <div id="loading" class="text-center my-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">데이터를 불러오는 중입니다...</p>
        </div>

        <div id="list-section" style="display: none;">
            <div class="table-responsive">
                <table id="analysisTable" class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>자치구</th>
                            <th>직위</th>
                            <th>성명</th>
                            <th class="text-right">2025년(천원)</th>
                            <th class="text-center">증감율</th>
                            <th class="text-right">2024년</th>
                            <th class="text-center">증감율</th>
                            <th class="text-right">2023년</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="footer-plugin"></div>

    <div class="modal fade" id="detailModal" tabindex="-1" aria-labelledby="detailModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="detailModalLabel">의원 상세 정보</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-4" style="height: 250px;">
                        <canvas id="detailChart"></canvas>
                    </div>
                    <div id="detailContent"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

    <script src="chart.js"></script>
    <script src="config.js"></script>
    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script src="script.js"></script>

</body>
</html>
