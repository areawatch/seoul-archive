<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울아카이브 | 공직자 재산 투명성 프로젝트</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="header-plugin"></div>

    <section class="hero-section">
        <div class="container text-center">
            <h1 class="display-4 fw-bold mb-3 hero-title">내 동네 공직자의 재산,<br><strong>얼마나 변했을까요?</strong></h1>
            <p class="lead mb-4 text-secondary" style="opacity: 0.8;">서울시 구청장 및 구의원 450여 명의 4개년 재산 데이터를 한눈에 확인하세요.</p>
            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <a href="archive.html" class="btn btn-primary btn-lg px-4 gap-3 shadow-sm">재산 목록 바로가기</a>
                <a href="#about" class="btn btn-outline-light btn-lg px-4">프로젝트 소개</a>
            </div>
        </div>
    </section>

    <main class="py-5">
        <div class="container">
            <div class="row g-4 mb-5 text-center">
                <div class="col-md-4">
                    <div class="card h-100 p-4 stat-card shadow-sm">
                        <div class="text-muted small mb-2">데이터 분석 규모</div>
                        <h2 class="fw-bold"><span id="total-count">0</span>명</h2>
                        <p class="mb-0 text-secondary small">
                            구청장 <span id="mayor-count">0</span>명 / 구의원 <span id="member-count">0</span>명
                        </p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100 p-4 stat-card shadow-sm">
                        <div class="text-muted small mb-2">2026년 재산 총합</div>
                        <h2 class="fw-bold text-danger"><span id="total-wealth">0</span></h2>
                        <p class="mb-0 text-secondary small">
                            구청장 <span id="mayor-total">0</span> / 구의원 <span id="member-total">0</span>
                        </p>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100 p-4 stat-card shadow-sm">
                        <div class="text-muted small mb-2">전년 대비 평균 증감</div>
                        <h2 class="fw-bold text-primary"><span id="avg-diff-total">0</span></h2>
                        <p class="mb-0 text-secondary small">
                            구청장 <span id="mayor-avg-diff">0</span> / 구의원 <span id="member-avg-diff">0</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-plugin"></div>

    <script>
        async function loadComponent(id, file) {
            try {
                const response = await fetch(file);
                const data = await response.text();
                const container = document.getElementById(id);
                if (container) { container.innerHTML = data; }
            } catch (err) { console.error(err); }
        }

        // ✨ 한국식 단위 변환 (글씨 크기 동일 버전)
        function formatKoreanUnit(val) {
            if (val === 0) return "0만";
            const sign = val < 0 ? "-" : "";
            let absVal = Math.abs(Math.round(val));
            
            const jo = Math.floor(absVal / 100000000); 
            const eok = Math.floor((absVal % 100000000) / 10000);
            const man = absVal % 10000;

            let result = "";
            if (jo > 0) result += `${jo}조 `;
            if (eok > 0) result += `${eok}억 `;
            if (man > 0 || result === "") result += `${man}만`;
            
            return sign + result.trim();
        }

        function animateValue(id, start, end, duration, isKorean = false, prefix = "") {
            const obj = document.getElementById(id);
            if (!obj) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const current = progress * (end - start) + start;
                
                if (isKorean) {
                    obj.innerHTML = prefix + formatKoreanUnit(current);
                } else {
                    obj.innerText = prefix + Math.floor(current).toLocaleString();
                }

                if (progress < 1) { window.requestAnimationFrame(step); }
            };
            window.requestAnimationFrame(step);
        }

        function renderStats(allData) {
            const data = Object.values(allData);
            const mayors = data.filter(i => i.position && i.position.includes("구청장"));
            const members = data.filter(i => i.position && !i.position.includes("구청장"));

            const duration = 1500;

            // 1. 인원
            animateValue("total-count", 0, data.length, duration);
            document.getElementById('mayor-count').innerText = mayors.length;
            document.getElementById('member-count').innerText = members.length;

            // 2. 재산 총합
            const sumMayor = mayors.reduce((acc, cur) => acc + (Number(cur.y2026) || 0), 0);
            const sumMember = members.reduce((acc, cur) => acc + (Number(cur.y2026) || 0), 0);
            
            animateValue("total-wealth", 0, sumMayor + sumMember, duration, true);
            document.getElementById('mayor-total').innerHTML = formatKoreanUnit(sumMayor);
            document.getElementById('member-total').innerHTML = formatKoreanUnit(sumMember);

            // 3. 평균 증감
            const getAvg = (arr) => {
                const valid = arr.filter(i => Number(i.y2025) > 0);
                return valid.length === 0 ? 0 : valid.reduce((acc, cur) => acc + (Number(cur.y2026) - Number(cur.y2025)), 0) / valid.length;
            };
            const diffTotal = getAvg(data);
            const diffMayor = getAvg(mayors);
            const diffMember = getAvg(members);

            animateValue("avg-diff-total", 0, diffTotal, duration, true, diffTotal > 0 ? "+" : "");
            document.getElementById('mayor-avg-diff').innerHTML = (diffMayor > 0 ? "+" : "") + formatKoreanUnit(diffMayor);
            document.getElementById('member-avg-diff').innerHTML = (diffMember > 0 ? "+" : "") + formatKoreanUnit(diffMember);
        }

        async function init() {
            loadComponent('header-plugin', 'header.html');
            loadComponent('footer-plugin', 'footer.html');
            try {
                const response = await fetch('data.json?v=' + Date.now());
                const data = await response.json();
                renderStats(data);
            } catch (err) { console.error(err); }
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
