                                </div>

                                    <div class="text-uppercase text-secondary fw-semibold mb-2" style="font-size:0.7rem;">구의원</div>
                                    <div class="text-muted" style="font-size:0.72rem;">총액</div>
                                    <div class="fw-bold text-dark mb-2 stat-value-line" id="c1-total-member">0</div>
                                    <div class="text-muted" style="font-size:0.72rem;">평균</div>

                                </div>

                    </div>
                </div>
                <!-- 카드 2: 부동산 -->
                <div class="col-lg-4 col-md-6">
                    <div class="card h-100 stat-card shadow-sm border-0" style="border-top: 4px solid #001066 !important;">
                        <div class="card-body p-4">
                            <div class="fs-6 fw-bold text-secondary mb-3 text-center">부동산(토지+건물) 총액 및 1인당 평균</div>
                            <div class="row g-0 text-center stat-triple">
                                <div class="col-4 border-end">
                                    <div class="text-uppercase text-secondary fw-semibold mb-2" style="font-size:0.7rem;">전체</div>
                                    <div class="text-muted" style="font-size:0.72rem;">총액</div>

                                </div>
                                <div class="col-4 border-end">
                                    <div class="text-uppercase text-secondary fw-semibold mb-2" style="font-size:0.7rem;">구청장</div>
                                    <div class="text-muted" style="font-size:0.72rem;">총액</div>
                                    <div class="fw-bold text-dark mb-2 stat-value-line" id="c2-total-mayor">0</div>
                                    <div class="text-muted" style="font-size:0.72rem;">평균</div>
                                    <div class="fw-semibold small" id="c2-avg-mayor">0</div>
                                </div>
                                <div class="col-4">
                                    <div class="text-uppercase text-secondary fw-semibold mb-2" style="font-size:0.7rem;">구의원</div>
                                    <div class="text-muted" style="font-size:0.72rem;">총액</div>
                                    <div class="fw-bold text-dark mb-2 stat-value-line" id="c2-total-member">0</div>
                                    <div class="text-muted" style="font-size:0.72rem;">평균</div>

                                </div>

                        </div>
                    </div>

                <!-- 카드 3: 금융자산 -->
                <div class="col-lg-4 col-md-6">
                    <div class="card h-100 stat-card shadow-sm border-0" style="border-top: 4px solid #40127e !important;">
                        <div class="card-body p-4">
                            <div class="fs-6 fw-bold text-secondary mb-3 text-center">금융자산(현금·예금·증권) 총액 및 평균</div>
                            <div class="row g-0 text-center stat-triple">
                                <div class="col-4 border-end">
                                    <div class="text-uppercase text-secondary fw-semibold mb-2" style="font-size:0.7rem;">전체</div>
                                    <div class="text-muted" style="font-size:0.72rem;">총액</div>
                                    <div class="fw-bold text-danger mb-2 stat-value-line" id="c3-total-all">0</div>
                                    <div class="text-muted" style="font-size:0.72rem;">평균</div>
                                    <div class="fw-semibold small" id="c3-avg-all">0</div>
                                </div>
                                <div class="col-4 border-end">
                                    <div class="text-uppercase text-secondary fw-semibold mb-2" style="font-size:0.7rem;">구청장</div>
                                    <div class="text-muted" style="font-size:0.72rem;">총액</div>
                                    <div class="fw-bold text-dark mb-2 stat-value-line" id="c3-total-mayor">0</div>
                                    <div class="text-muted" style="font-size:0.72rem;">평균</div>

                                </div>

                                    <div class="text-uppercase text-secondary fw-semibold mb-2" style="font-size:0.7rem;">구의원</div>
                                    <div class="text-muted" style="font-size:0.72rem;">총액</div>
                                    <div class="fw-bold text-dark mb-2 stat-value-line" id="c3-total-member">0</div>
                                    <div class="text-muted" style="font-size:0.72rem;">평균</div>
                                    <div class="fw-semibold small" id="c3-avg-member">0</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="footer-plugin"></div>

    <script>
        async function loadComponent(id, file) {
            try {
                const response = await fetch(file);
                if (!response.ok) return;
                const data = await response.text();
                const container = document.getElementById(id);
                if (container) {
                    container.innerHTML = data;
                    if (id === 'header-plugin') {
                        const nav = container.querySelector('nav');
                        if (nav) { nav.classList.remove('mb-4'); nav.classList.add('mb-0'); }
                    }
                }
            } catch (err) { console.error(file + " 로드 실패:", err); }
        }

        /** 만원 기준 → 조·억·만 (0은 0조 0억 0만) */
        function formatKoreanUnit(manValue) {
            if (manValue === 0) return "0조 0억 0만";
            const sign = manValue < 0 ? "-" : "";
            let absVal = Math.abs(Math.round(manValue));
            const jo = Math.floor(absVal / 100000000);
            const eok = Math.floor((absVal % 100000000) / 10000);
            const man = absVal % 10000;
            let result = "";
            if (jo > 0) result += `${jo}조 `;
            if (eok > 0) result += `${eok}억 `;
            if (man > 0 || result === "") result += `${man}만`;
            return sign + result.trim();
        }

        function animateValue(id, start, end, duration, isKorean = false, prefix = "") {
            const obj = document.getElementById(id);
            if (!obj) return;
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const current = progress * (end - start) + start;

                if (isKorean) {
                    obj.innerHTML = prefix + formatKoreanUnit(Math.round(current));
                } else {
                    obj.innerText = prefix + Math.floor(current).toLocaleString();
                }

                if (progress < 1) { window.requestAnimationFrame(step); }
            };
            window.requestAnimationFrame(step);
        }

        function isMayor(p) {
            return p.position && String(p.position).includes("구청장");
        }

        function activeWithY2026(arr) {
            return arr.filter(i => Number(i.y2026) > 0);
        }

        function toMan(cheon) {
            return (Number(cheon) || 0) / 10;
        }

        function sumY2026(arr) {
            return arr.reduce((a, i) => a + (Number(i.y2026) || 0), 0);
        }

        function sumRealEstateCheon(arr) {
            return arr.reduce((a, i) => {
                return a + (Number(i.land2026) || 0) + (Number(i.building2026) || 0);
            }, 0);
        }

        function sumFinanceCheon(arr) {
            return arr.reduce((a, i) => {
                return a + (Number(i.cash2026) || 0) + (Number(i.deposit2026) || 0) + (Number(i.stock2026) || 0);
            }, 0);
        }

        function avgManFromCheonSum(sumCheon, count) {
            if (!count) return 0;
            return toMan(sumCheon / count);
        }

        function renderStats(allData) {
            const data = Object.values(allData);
            const mayorAll = data.filter(isMayor);
            const memberAll = data.filter(p => p.position && !isMayor(p));

            const activeAll = activeWithY2026(data);
            const activeMayors = activeWithY2026(mayorAll);
            const activeMembers = activeWithY2026(memberAll);

            const duration = 1500;
            const districts = new Set(data.map(i => i.district).filter(Boolean)).size;

            animateValue("hero-district-count", 0, districts, duration, false);
            animateValue("hero-mayor-count", 0, mayorAll.length, duration, false);
            animateValue("hero-member-count", 0, memberAll.length, duration, false);

            const packs = [
                {
                    prefix: "c1",
                    sumCheonAll: sumY2026(activeAll),
                    sumCheonMayor: sumY2026(activeMayors),
                    sumCheonMember: sumY2026(activeMembers),
                    nAll: activeAll.length,
                    nMayor: activeMayors.length,
                    nMember: activeMembers.length
                },
                {
                    prefix: "c2",
                    sumCheonAll: sumRealEstateCheon(activeAll),
                    sumCheonMayor: sumRealEstateCheon(activeMayors),
                    sumCheonMember: sumRealEstateCheon(activeMembers),
                    nAll: activeAll.length,
                    nMayor: activeMayors.length,
                    nMember: activeMembers.length
                },
                {
                    prefix: "c3",
                    sumCheonAll: sumFinanceCheon(activeAll),
                    sumCheonMayor: sumFinanceCheon(activeMayors),
                    sumCheonMember: sumFinanceCheon(activeMembers),
                    nAll: activeAll.length,
                    nMayor: activeMayors.length,
                    nMember: activeMembers.length
                }
            ];

            packs.forEach((p) => {
                const totalManAll = toMan(p.sumCheonAll);
                const totalManMayor = toMan(p.sumCheonMayor);
                const totalManMember = toMan(p.sumCheonMember);
                const avgAll = avgManFromCheonSum(p.sumCheonAll, p.nAll);
                const avgMayor = avgManFromCheonSum(p.sumCheonMayor, p.nMayor);
                const avgMember = avgManFromCheonSum(p.sumCheonMember, p.nMember);

                animateValue(`${p.prefix}-total-all`, 0, totalManAll, duration, true);
                animateValue(`${p.prefix}-avg-all`, 0, avgAll, duration, true);
                animateValue(`${p.prefix}-total-mayor`, 0, totalManMayor, duration, true);
                animateValue(`${p.prefix}-avg-mayor`, 0, avgMayor, duration, true);
                animateValue(`${p.prefix}-total-member`, 0, totalManMember, duration, true);
                animateValue(`${p.prefix}-avg-member`, 0, avgMember, duration, true);
            });
        }

        async function init() {
            await loadComponent('header-plugin', 'header.html');
            await loadComponent('footer-plugin', 'footer.html');

            try {
                const response = await fetch('data.json?v=' + Date.now());
                if (!response.ok) throw new Error("JSON 파일을 찾을 수 없습니다.");
                const data = await response.json();
                console.log("✅ 데이터 로드 성공");
                renderStats(data);
            } catch (err) {
                console.error("데이터 초기화 에러:", err);
            }
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
