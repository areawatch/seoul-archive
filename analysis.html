<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터 분석 - 서울시 의원 재산 아카이브</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">👀 서울아카이브</a>
            <div class="navbar-nav">
                <a class="nav-link" href="index.html">재산 목록</a>
                <a class="nav-link active" href="analysis.html">통계 분석</a>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <div id="loading" class="text-center my-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted">데이터를 정밀 분석 중입니다...</p>
            <div class="progress mt-2 mx-auto" style="width: 200px; height: 10px;">
                <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%"></div>
            </div>
        </div>

        <div id="stat-section" style="display:none;">
            <div class="row g-4 mb-4">
                <div class="col-lg-6">
                    <div class="card p-4 shadow-sm h-100 border-0">
                        <h5 class="fw-bold mb-4">🏛️ 정당별 의원 수 비중</h5>
                        <div style="position: relative; height:300px;">
                            <canvas id="partyPieChart"></canvas>
                        </div>
                    </div>
                </div>

                <div class="col-lg-6">
                    <div class="card p-4 shadow-sm h-100 border-0">
                        <h5 class="fw-bold mb-4">💰 정당별 1인당 평균 재산</h5>
                        <div style="position: relative; height:300px;">
                            <canvas id="partyAvgChart"></canvas>
                        </div>
                        <p class="text-muted fs-7 mt-2 text-end">* 단위: 천원</p>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-12">
                    <div class="card p-4 shadow-sm border-0">
                        <h5 class="fw-bold mb-4">📊 자치구별 1인당 평균 재산</h5>
                        <div style="position: relative; height:500px;">
                            <canvas id="districtChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-white border-top py-4 mt-5">
        <div class="container text-center text-muted">
            <p class="mb-1">© 2026 구정감시 서울 네트워크 - 구석구석</p>
        </div>
    </footer>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
