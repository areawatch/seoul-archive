<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자치구별 분석 | 서울아카이브</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">👀서울아카이브</a>
    </div>
</nav>

<div class="container my-5">
    <div class="row mb-5">
        <div class="col-6 col-md-3 mb-3">
            <a href="index.html" class="btn btn-outline-primary w-100 fw-bold py-3 shadow-sm">🏠 메인 홈</a>
        </div>
        <div class="col-6 col-md-3 mb-3">
            <a href="analysis.html" class="btn btn-primary w-100 fw-bold py-3 shadow-sm">📊 자치구별 분석</a>
        </div>
    </div>

    <h2 class="fw-bold mb-4 border-bottom pb-2">📊 자치구별 재산 현황 데이터 분석</h2>

    <div id="loading" class="text-center p-5 card shadow-sm mb-5">
        <div class="spinner-border text-primary mb-3"></div>
        <h5 class="fw-bold text-muted">통계 차트를 생성 중입니다...</h5>
    </div>

    <div id="stat-section" class="card p-4 mb-5 shadow-sm" style="display:none;">
        <h4 class="fw-bold mb-4">자치구별 의원 1인당 평균 재산액 (단위: 천원)</h4>
        <div class="chart-container" style="position: relative; height:700px; width:100%">
            <canvas id="districtChart"></canvas>
        </div>
    </div>

    <div class="row">
    <div class="col-lg-6 mb-5">
        <div class="card p-4 shadow-sm h-100">
            <h4 class="fw-bold mb-4">정당별 의원 수 비중</h4>
            <div style="position: relative; height:350px;">
                <canvas id="partyPieChart"></canvas>
            </div>
        </div>
    </div>
    <div class="col-lg-6 mb-5">
        </div>
    </div>
</div>

<footer class="bg-dark text-light text-center p-4 mt-5">
    <div class="container">
        <p class="m-0 fs-7">👀서울아카이브 | 시민의 눈으로 기록하는 의회 아카이브</p>
    </div>
</footer>

<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script src="script.js"></script>
</body>
</html>
