<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-HXSD5K4LM6"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-HXSD5K4LM6");
    </script>
    <title>후보자 상세 — 서울 본후보 명부</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../style.css" />
    <style>
      body {
        font-family: "Pretendard Variable", Pretendard, system-ui, sans-serif;
      }
      .detail-field dt {
        font-size: 0.7rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #64748b;
      }
      .detail-field dd {
        margin-top: 0.25rem;
        font-size: 0.925rem;
        line-height: 1.55;
        color: #0f172a;
        white-space: pre-line;
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800 antialiased">
    <div id="header-plugin"></div>
    <main class="mx-auto max-w-3xl px-4 py-8 sm:px-6">
      <p class="mb-4">
        <a href="list.html" class="text-sm font-bold text-slate-600 hover:text-slate-900">← 본후보 명부</a>
      </p>
      <div id="loading" class="rounded-xl border border-slate-200 bg-white p-8 text-center text-slate-500">
        불러오는 중…
      </div>
      <div id="errorBox" class="hidden rounded-xl border border-red-200 bg-red-50 p-6 text-red-800"></div>
      <article id="detailRoot" class="hidden overflow-hidden rounded-2xl border-2 border-slate-800 bg-white shadow-[4px_4px_0_rgba(2,6,23,0.2)]"></article>
    </main>
    <div id="footer-plugin"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const NEC_ELECTION_ID = "0020260603";
      const DEFAULT_AVATAR =
        "data:image/svg+xml," +
        encodeURIComponent(
          '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none"><rect width="120" height="120" fill="#e2e8f0"/><circle cx="60" cy="48" r="22" fill="#94a3b8"/><path d="M24 108c8-22 28-34 36-34s28 12 36 34" fill="#94a3b8"/></svg>'
        );

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function primaryName(raw) {
        return String(raw || "").split("\n")[0].trim();
      }

      function subtitleName(raw) {
        const lines = String(raw || "")
          .split("\n")
          .map((s) => s.trim())
          .filter(Boolean);
        if (lines.length < 2) return "";
        return lines.slice(1).join(" · ");
      }

      function candidateOffice(c) {
        return String((c && c.office) || "구의원").trim() || "구의원";
      }

      function necHuboDetailUrl(huboId, c) {
        const status = String((c && c.candidate_status) || "official").trim().toLowerCase();
        const path =
          status === "official" ? "candidate_detail_info.xhtml" : "precandidate_detail_info.xhtml";
        const q = new URLSearchParams({ electionId: NEC_ELECTION_ID, huboId: String(huboId) });
        return "https://info.nec.go.kr/electioninfo/" + path + "?" + q.toString();
      }

      function criminalShowsRecord(criminal) {
        const t = String(criminal ?? "").trim();
        if (!t || t === "없음") return false;
        if (/^0\s*건$/.test(t)) return false;
        return true;
      }

      function detailField(label, valueHtml, wide) {
        const span = wide ? " sm:col-span-2" : "";
        const val = valueHtml && valueHtml !== "" ? valueHtml : "—";
        return (
          '<div class="detail-field' +
          span +
          '"><dt>' +
          escapeHtml(label) +
          '</dt><dd>' +
          val +
          "</dd></div>"
        );
      }

      function fmtVal(v) {
        const t = String(v ?? "").trim();
        return t ? escapeHtml(t) : "—";
      }

      function renderCandidate(c) {
        const pname = primaryName(c.name);
        const sub = subtitleName(c.name);
        const photo = (c.photo || "").trim() || DEFAULT_AVATAR;
        const nec =
          c.huboId != null && String(c.huboId).trim() !== ""
            ? '<a href="' +
              escapeHtml(necHuboDetailUrl(c.huboId, c)) +
              '" target="_blank" rel="noopener noreferrer" class="mt-3 inline-flex items-center gap-1 text-sm font-bold text-blue-700 underline">선관위 후보 상세 보기 ↗</a>'
            : "";
        const criminal = String(c.criminal || "").trim() || "—";
        const criminalHtml = criminalShowsRecord(c.criminal)
          ? escapeHtml(criminal) +
            ' · <a href="' +
            escapeHtml(necHuboDetailUrl(c.huboId, c)) +
            '" target="_blank" rel="noopener noreferrer" class="font-bold text-blue-700 underline">전과 서류(선관위)</a>'
          : escapeHtml(criminal);

        const taxBlock =
          c.taxPaid || c.taxArrears5y || c.taxArrearsCurrent
            ? '<ul class="list-disc space-y-0.5 pl-4"><li>납부액: ' +
              fmtVal(c.taxPaid) +
              "</li><li>최근 5년간 체납액: " +
              fmtVal(c.taxArrears5y) +
              "</li><li>현체납액: " +
              fmtVal(c.taxArrearsCurrent) +
              "</li></ul>"
            : "";

        document.title = pname + " — 후보자 상세";

        const grid =
          detailField("기호", fmtVal(c.ballot)) +
          detailField("성별", fmtVal(c.gender)) +
          detailField("생년월일(연령)", fmtVal(c.age)) +
          detailField("주소", fmtVal(c.address)) +
          detailField("직업", fmtVal(c.job)) +
          detailField("재산신고액(천원)", fmtVal(c.propertyDeclared)) +
          detailField("병역 신고(본인)", fmtVal(c.military)) +
          detailField("입후보 횟수", fmtVal(c.candidacyCount)) +
          detailField("전과 기록", criminalHtml) +
          detailField("납세실적(천원)", taxBlock || "—", true) +
          detailField("학력", fmtVal(c.education), true) +
          detailField("경력", fmtVal(c.career), true) +
          detailField("등록일자", fmtVal(c.regDate));

        document.getElementById("detailRoot").innerHTML =
          '<div class="border-b border-slate-200 bg-[#0b1220] px-5 py-4 text-white">' +
          '<p class="text-[10px] font-black uppercase tracking-widest text-[#ff4d4d]">본후보 상세</p>' +
          '<h1 class="mt-1 text-2xl font-black">' +
          escapeHtml(pname) +
          "</h1>" +
          (sub ? '<p class="mt-0.5 text-sm text-slate-300">' + escapeHtml(sub) + "</p>" : "") +
          "</div>" +
          '<div class="flex flex-col gap-5 p-5 sm:flex-row sm:gap-6">' +
          '<img src="' +
          escapeHtml(photo) +
          '" width="120" height="144" alt="" class="h-36 w-[7.5rem] shrink-0 rounded-xl object-cover object-top ring-2 ring-slate-300" onerror="this.onerror=null;this.src=\'' +
          DEFAULT_AVATAR +
          "'\" />" +
          '<div class="min-w-0 flex-1"><p class="text-sm font-black text-slate-800">' +
          escapeHtml(c.party || "정당 미상") +
          '</p><p class="mt-1 text-sm text-slate-600">' +
          escapeHtml(candidateOffice(c)) +
          " · " +
          escapeHtml(c.constituency || c.district || "—") +
          "</p>" +
          nec +
          '</div></div><dl class="grid grid-cols-1 gap-4 border-t border-slate-200 px-5 py-5 sm:grid-cols-2">' +
          grid +
          '</dl><p class="border-t border-slate-100 px-5 py-3 text-[11px] text-slate-400">출처: 중앙선거관리위원회 선거통계시스템 · ' +
          escapeHtml(c.election_name || "2026지방선거") +
          "</p>";

        document.getElementById("loading").classList.add("hidden");
        document.getElementById("detailRoot").classList.remove("hidden");
      }

      function showError(msg) {
        document.getElementById("loading").classList.add("hidden");
        const box = document.getElementById("errorBox");
        box.textContent = msg;
        box.classList.remove("hidden");
      }

      async function loadHeaderFooter() {
        try {
          const [h, f] = await Promise.all([
            fetch("header.html").then((r) => r.text()),
            fetch("footer.html").then((r) => r.text()),
          ]);
          const hp = document.getElementById("header-plugin");
          const fp = document.getElementById("footer-plugin");
          if (hp) hp.innerHTML = h;
          if (fp) fp.innerHTML = f;
        } catch (_) {}
      }

      const huboId = new URLSearchParams(window.location.search).get("huboId");
      loadHeaderFooter();
      if (!huboId || !String(huboId).trim()) {
        showError("후보 식별자(huboId)가 없습니다. 명부에서 이름을 눌러 들어오세요.");
      } else {
        fetch("../public/data/candidates.json")
          .then((r) => {
            if (!r.ok) throw new Error("candidates.json HTTP " + r.status);
            return r.json();
          })
          .then((payload) => {
            const list = Array.isArray(payload.candidates) ? payload.candidates : [];
            const c = list.find((x) => String(x.huboId) === String(huboId).trim());
            if (!c) {
              showError("해당 후보를 찾을 수 없습니다. 데이터가 갱신되었거나 huboId가 잘못되었을 수 있습니다.");
              return;
            }
            renderCandidate(c);
          })
          .catch((e) => {
            showError("데이터를 불러오지 못했습니다. " + (e && e.message ? e.message : String(e)));
          });
      }
    </script>
  </body>
</html>
