      /* 헤더 아래: 레트로 슬라이드 배너(RED LINE과 통일) */
      .villain-slide {
        position: relative;
        overflow: hidden;
        background: radial-gradient(980px 260px at 50% 0%, rgba(255, 77, 77, 0.26), transparent 62%),
          radial-gradient(740px 260px at 10% 20%, rgba(217, 70, 239, 0.18), transparent 60%),
          radial-gradient(760px 240px at 90% 28%, rgba(34, 211, 238, 0.18), transparent 60%),
          radial-gradient(880px 320px at 50% 115%, rgba(250, 204, 21, 0.10), transparent 55%),
          linear-gradient(180deg, #0b0f2a 0%, #07081a 100%);
        border: 4px solid #000;
        border-radius: 0;
        box-shadow: none;
      }
      .villain-slide::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.38;
        background-image:
          repeating-linear-gradient(
            to bottom,
            rgba(255, 255, 255, 0.09) 0px,
            rgba(255, 255, 255, 0.09) 1px,
            rgba(0, 0, 0, 0) 3px,
            rgba(0, 0, 0, 0) 6px
          ),
          radial-gradient(rgba(255, 255, 255, 0.08) 1px, transparent 1px);
        background-size: auto, 10px 10px;
        mix-blend-mode: overlay;
      }
      .villain-slide::after {
        content: "";
        position: absolute;
        inset: -40% -20%;
        pointer-events: none;
        background:
          radial-gradient(closest-side, rgba(250, 204, 21, 0.16), transparent 60%),
          radial-gradient(rgba(34, 211, 238, 0.12) 1px, transparent 1px),
          radial-gradient(rgba(255, 77, 77, 0.10) 1px, transparent 1px);
        background-size: auto, 14px 14px, 18px 18px;
        background-position: 0 0, 0 0, 8px 10px;
        opacity: 0.55;
        animation: villainSlideBreath 14s ease-in-out infinite;
      }
      @keyframes villainSlideBreath {
        0%,
        100% {
          opacity: 0.52;
        }
        50% {
          opacity: 0.62;
        }
      }

      .villain-marquee {
        position: relative;
        border: 2px solid #000;
        box-shadow: none;
        overflow: hidden;
        background:
          radial-gradient(12px 12px at 10% 50%, rgba(255, 77, 77, 0.85), transparent 55%),
          linear-gradient(90deg, rgba(255, 77, 77, 0.16), rgba(34, 211, 238, 0.12), rgba(250, 204, 21, 0.12));
        background-size: auto, 100% 100%;
      }
      .villain-marquee::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.25;
        background-image: repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.12) 0px,
          rgba(255, 255, 255, 0.12) 1px,
          rgba(0, 0, 0, 0) 3px,
          rgba(0, 0, 0, 0) 7px
        );
        mix-blend-mode: overlay;
      }
      .villain-ticker-text {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        white-space: nowrap;
      }
      .villain-ticker-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #ff4d4d;
        box-shadow: none;
        animation: villainDotBlink 1.4s steps(2, end) infinite;
      }
      @keyframes villainDotBlink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.25;
        }
      }

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      (function () {
        async function inject(id, url) {
          try {
            const r = await fetch(url);
            if (!r.ok) return;
            const el = document.getElementById(id);
            if (el) el.innerHTML = await r.text();
          } catch (e) {
            console.warn("[candidates] 헤더·푸터 로드:", e);
          }
        }
        function highlightCandidatesSubnav() {
          var path = (location.pathname || "").replace(/\/+$/, "");
          var parts = path.split("/").filter(function (s) {
            return s.length > 0;
          });
          var seg = (parts[parts.length - 1] || "").split("?")[0].toLowerCase();
          var base = seg.replace(/\.(html|htm)$/i, "");
          var listLink = document.querySelector("a[data-candidates-subnav='list']");
          var briefLink = document.querySelector("a[data-candidates-subnav='briefing']");
          var redlineLink = document.querySelector("a[data-candidates-subnav='redline']");
          var expeditionLink = document.querySelector("a[data-candidates-subnav='expedition']");
          if (!listLink || !briefLink) return;
          listLink.classList.remove("active");
          briefLink.classList.remove("active");
          listLink.removeAttribute("aria-current");
          briefLink.removeAttribute("aria-current");
          if (redlineLink) {
            redlineLink.classList.remove("active");
            redlineLink.removeAttribute("aria-current");
          }
          if (expeditionLink) {
            expeditionLink.classList.remove("active");
            expeditionLink.removeAttribute("aria-current");
          }
          var page = "redline";
          if (base === "list") page = "list";
          else if (base === "briefing") page = "briefing";
          else if (base === "status") page = "expedition";
          else if (base === "index" || base === "redline" || base === "candidates" || base === "") page = "redline";
          if (page === "briefing") {
            briefLink.classList.add("active");
            briefLink.setAttribute("aria-current", "page");
          } else if (page === "list") {
            listLink.classList.add("active");
            listLink.setAttribute("aria-current", "page");
          } else if (page === "expedition" && expeditionLink) {
            expeditionLink.classList.add("active");
            expeditionLink.setAttribute("aria-current", "page");
          } else if (page === "redline" && redlineLink) {
            redlineLink.classList.add("active");
            redlineLink.setAttribute("aria-current", "page");
          } else if (redlineLink) {
            redlineLink.classList.add("active");
            redlineLink.setAttribute("aria-current", "page");
          } else {
            listLink.classList.add("active");
            listLink.setAttribute("aria-current", "page");
          }
        }
        (async function () {
          await inject("header-plugin", "header.html");
          highlightCandidatesSubnav();
          await inject("footer-plugin", "footer.html");
          document.querySelector("#footer-plugin .site-footer")?.classList.add("site-footer--dark");
        })();
      })();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../config.js"></script>
    <script src="../archive-wealth-modal.js"></script>

    <script>
      /* 선관위 예비후보 명부「구시군」선택 순서와 동일 */
      const SEOUL_DISTRICTS = [
        "종로구",
        "중구",
        "용산구",
        "성동구",
        "광진구",
        "동대문구",
        "중랑구",
        "성북구",
        "강북구",
        "도봉구",
        "노원구",
        "은평구",
        "서대문구",
        "마포구",
        "양천구",
        "강서구",
        "구로구",
        "금천구",
        "영등포구",
        "동작구",
        "관악구",
        "서초구",
        "강남구",
        "송파구",
        "강동구",
      ];

      const NEC_ELECTION_ID = "0020260603";

      function criminalShowsRecord(criminal) {
        const t = String(criminal ?? "").trim();
        if (!t || t === "없음") return false;
        if (/^0\s*건$/.test(t)) return false;
        return true;
      }

      function necPreHuboDetailUrl(huboId) {
        const q = new URLSearchParams({
          electionId: NEC_ELECTION_ID,
          huboId: String(huboId),
        });
        return (
          "https://info.nec.go.kr/electioninfo/precandidate_detail_info.xhtml?" +
          q.toString()
        );
      }

      function formatCriminalBlock(c) {
        const label = escapeHtml((c.criminal || "").trim() || "—");
        const hid = c.huboId != null && String(c.huboId).trim() !== "";
        if (!criminalShowsRecord(c.criminal) || !hid) {
          return `<span class="font-medium">${label}</span>`;
        }
        const href = escapeHtml(necPreHuboDetailUrl(c.huboId));
        return `<span class="font-medium">${label}</span>
          <a href="${href}" target="_blank" rel="noopener noreferrer" title="선관위 상세 창에서 「전과」를 누르면 스캔 서류를 볼 수 있습니다." class="ml-2 inline-block font-medium text-blue-700 underline decoration-blue-300 underline-offset-2 hover:text-blue-900">전과 서류 보기</a>`;
      }

      const DEFAULT_AVATAR =
        "data:image/svg+xml," +
        encodeURIComponent(
          `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
            <rect width="120" height="120" fill="#e2e8f0"/>
            <circle cx="60" cy="48" r="22" fill="#94a3b8"/>
            <path d="M24 108c4-28 72-28 72 0" fill="#94a3b8"/>
          </svg>`
        );

      /** 공식·CI에 가까운 메인 컬러 (config.js partyColors와 동기) */
      const PARTY_STYLES = {
        더불어민주당: {
          badgeSolid: "bg-[#004EA2] text-white",
        },
        국민의힘: {
          badgeSolid: "bg-[#E61E2B] text-white",
        },
        조국혁신당: {
          badgeSolid: "bg-[#06275E] text-white",
        },
        정의당: {
          badgeSolid: "bg-[#ffca00] text-slate-900",
        },
        기본소득당: {
          badgeSolid: "bg-[#00D2C3] text-slate-900",
        },
        개혁신당: {
          badgeSolid: "bg-[#FF7F32] text-white",
        },
        녹색당: {
          badgeSolid: "bg-[#5CB531] text-white",
        },
        노동당: {
          badgeSolid: "bg-[#FF0000] text-white",
        },
        진보당: {
          badgeSolid: "bg-[#E60020] text-white",
        },
        무소속: {
          badgeSolid: "bg-[#707070] text-white",
        },
      };

      const NEUTRAL_PARTY = {
        badgeSolid: "bg-[#64748B] text-white",
      };

      function partyTheme(party) {
        return PARTY_STYLES[party] || NEUTRAL_PARTY;
      }

      function ageSummary(ageStr) {
        const s = String(ageStr || "").replace(/\n/g, " ");
        const m = s.match(/\((\d+)세\)/);
        if (m) return m[1] + "세";
        const m2 = s.match(/(\d+)세/);
        if (m2) return m2[1] + "세";
        const t = s.trim();
        return t ? t.split(/\s+/)[0] : "—";
      }

      /** 정렬용 연령(숫자); 파싱 불가 시 null(목록 맨 뒤) */
      function sortableAgeYears(ageStr) {
        const s = String(ageStr || "").replace(/\n/g, " ");
        const m = s.match(/\((\d+)세\)/);
        if (m) return parseInt(m[1], 10);
        const m2 = s.match(/(\d+)세/);
        if (m2) return parseInt(m2[1], 10);
        const t = s.trim().split(/\s+/)[0];
        const m3 = /^(\d+)$/.exec(t);
        if (m3) return parseInt(m3[1], 10);
        return null;
      }

      function criminalSortRank(c) {
        const t = String(c.criminal ?? "").trim();
        if (!t || t === "없음" || /^0\s*건$/.test(t)) return 0;
        return 1;
      }

      /** 전과 문자열에서 N건 합산; 숫자 없으면 1 */
      function parseCriminalCaseCount(criminal) {
        var s = String(criminal ?? "").trim();
        if (!s || s === "없음" || /^0\s*건$/.test(s)) return 0;
        var re = /(\d+)\s*건/g;
        var sum = 0;
        var m;
        while ((m = re.exec(s)) !== null) sum += parseInt(m[1], 10);
        return sum > 0 ? sum : 1;
      }

      /** 브리핑 1항: 정당색 뱃지 + 볼드 이름 */
      function statsBriefPartyBoldName(c) {
        var p = String(c.party || "정당 미상").trim() || "정당 미상";
        var t = partyTheme(c.party);
        return (
          '<span class="relative top-[-1px] mr-1 inline-flex max-w-[9rem] shrink-0 items-center truncate rounded px-1 py-px text-[10px] font-bold leading-none ' +
          t.badgeSolid +
          '">' +
          escapeHtml(p) +
          '</span><strong class="font-black text-white">' +
          escapeHtml(primaryName(c.name)) +
          "</strong>"
        );
      }

      function updateCandidatesStatsPanel(filtered) {
        var el = document.getElementById("candidatesStatsPanel");
        if (!el) return;
        var n = filtered.length;
        if (n === 0) {
          el.innerHTML =
            '<p class="text-sm text-slate-300">필터와 일치하는 후보가 없어 통계를 표시할 수 없습니다.</p>';
          return;
        }
        var ageSum = 0;
        var ageN = 0;
        filtered.forEach(function (c) {
          var y = sortableAgeYears(c.age);
          if (y != null) {
            ageSum += y;
            ageN++;
          }
        });
        var avgAgeStr = ageN > 0 ? (ageSum / ageN).toFixed(1) + "세" : "산출 불가";
        var maxY = -Infinity;
        var minY = Infinity;
        var oldestC = null;
        var youngestC = null;
        filtered.forEach(function (c) {
          var y = sortableAgeYears(c.age);
          if (y == null) return;
          if (y > maxY) {
            maxY = y;
            oldestC = c;
          }
          if (y < minY) {
            minY = y;
            youngestC = c;
          }
        });
        var ageExt =
          ageN > 0 && oldestC && youngestC
            ? " 최고령자는 " +
              statsBriefPartyBoldName(oldestC) +
              " 후보(" +
              maxY +
              "세), 최연소자는 " +
              statsBriefPartyBoldName(youngestC) +
              " 후보(" +
              minY +
              "세)입니다."
            : "";
        var withCr = filtered.filter(function (c) {
          return criminalSortRank(c) === 1;
        }).length;
        var crPct = ((withCr / n) * 100).toFixed(1);
        var topCrN = -1;
        filtered.forEach(function (c) {
          if (criminalSortRank(c) !== 1) return;
          var cnt = parseCriminalCaseCount(c.criminal);
          if (cnt > topCrN) topCrN = cnt;
        });
        var topCrList = [];
        if (topCrN >= 0) {
          filtered.forEach(function (c) {
            if (criminalSortRank(c) !== 1) return;
            if (parseCriminalCaseCount(c.criminal) === topCrN) topCrList.push(c);
          });
        }
        var female = filtered.filter(function (c) {
          return String(c.gender || "").trim() === "여";
        }).length;
        var fPct = ((female / n) * 100).toFixed(1);
        var wealthCur = filtered.filter(function (c) {
          return hasWealthDisclosureInArchive(c);
        }).length;
        el.innerHTML =
          '<h2 class="mb-3 text-base font-black tracking-tight text-white">👀구정감시 브리핑</h2>' +
          '<ol class="m-0 list-decimal space-y-2 pl-5 text-sm leading-relaxed text-slate-200">' +
          '<li>평균 나이는 <span class="font-black text-white">' +
          escapeHtml(avgAgeStr) +
          "</span> 입니다." +
          ageExt +
          "</li>" +
          '<li>전과가 있는 후보는 총 <span class="font-black text-white">' +
          escapeHtml(String(withCr)) +
          '</span>명으로 전체 후보의 <span class="font-black text-white">' +
          escapeHtml(crPct) +
          "%</span>입니다" +
          (withCr > 0 && topCrList.length > 0
            ? " 이며, 가장 건수가 많은 후보는 " +
              escapeHtml(String(topCrN)) +
              "건으로 " +
              topCrList
                .map(function (c) {
                  return statsBriefPartyBoldName(c) + " 후보";
                })
                .join(", ") +
              "입니다"
            : "") +
          ".</li>" +
          '<li>여성 후보는 <span class="font-black text-white">' +
          escapeHtml(String(female)) +
          '</span>명으로 전체 후보의 <span class="font-black text-white">' +
          escapeHtml(fPct) +
          "%</span>입니다.</li>" +
          '<li>재산 공개 명부에 등재되어 재산 내역을 열람할 수 있는 후보는 <span class="font-black text-white">' +
          escapeHtml(String(wealthCur)) +
          "</span>명입니다.</li>" +
          "</ol>" +
          '<p class="mt-3 border-t border-white/10 pt-3 text-xs text-slate-400">※ 위 통계는 현재 필터·검색에 해당하는 <span class="font-black text-slate-200">' +
          n +
          "</span>명을 기준으로 합니다.</p>";
      }

      function elide(str, max) {
        const t = String(str || "")
          .replace(/\s+/g, " ")
          .trim();
        if (!t) return "";
        if (t.length <= max) return t;
        return t.slice(0, max - 1) + "…";
      }

      function educationFirstLine(raw) {
        const line = String(raw || "")
          .split("\n")
          .map((s) => s.trim())
          .filter(Boolean)[0];
        return line ? elide(line, 56) : "—";
      }

      function criminalTableCell(c) {
        const t = String(c.criminal ?? "").trim();
        if (!t || t === "없음" || /^0\s*건$/.test(t)) return "—";
        return elide(t, 24);
      }

      let lastFilteredCandidates = [];
      let mainSortKey = "name";
      let mainSortAsc = true;
      var LIST_PAGE_SIZE = 20;
      var visibleRowCount = LIST_PAGE_SIZE;
      let wealthPositionByKey = {};

      function normalizeWealthName(raw) {
        let s = String(raw || "").split("\n")[0].trim();
        s = s.replace(/\([^)]*\)/g, "").replace(/（[^）]*）/g, "");
        return s.replace(/\s+/g, " ").trim();
      }

      function buildWealthIndex(obj) {
        wealthPositionByKey = {};
        if (!obj || typeof obj !== "object") return;
        for (const row of Object.values(obj)) {
          if (!row || typeof row !== "object") continue;
          const d = String(row.district || "").trim();
          const n = normalizeWealthName(row.name);
          if (!d || !n) continue;
          const k = d + "|" + n;
          if (!wealthPositionByKey[k]) {
            wealthPositionByKey[k] = String(row.position || "").trim();
          }
        }
      }

      function wealthDisplayLabel(position) {
        const p = String(position || "").trim();
        if (!p) return "";
        if (p === "구의원") return "현 구의원";
        if (p === "전)구의원") return "전 구의원";
        if (p === "구청장") return "현 구청장";
        if (p === "전)구청장") return "전 구청장";
        if (p.startsWith("전)")) return "전 " + p.slice(2);
        return p;
      }

      function wealthLabelForCandidate(c) {
        const d = String(c.district || "").trim();
        const n = normalizeWealthName(c.name);
        if (!d || !n) return "";
        return wealthDisplayLabel(wealthPositionByKey[d + "|" + n]);
      }

      function wealthRawPositionForCandidate(c) {
        const d = String(c.district || "").trim();
        const n = normalizeWealthName(c.name);
        if (!d || !n) return "";
        return String(wealthPositionByKey[d + "|" + n] || "").trim();
      }

      function wealthMatchKeyForCandidate(c) {
        const d = String(c.district || "").trim();
        const n = normalizeWealthName(c.name);
        if (!d || !n) return null;
        return { district: d, name: n };
      }

      function wealthDetailLinkCaption(label) {
        return "재산내역";
      }

      const WEALTH_CHIP_ICON_SM = `<svg class="h-2.5 w-2.5 shrink-0 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>`;
      const WEALTH_CHIP_ICON_MD = `<svg class="h-3.5 w-3.5 shrink-0 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>`;

      /** 이름 옆에 붙는 작은 재산 칩 */
      function wealthInlineByNameHtml(c) {
        const label = wealthLabelForCandidate(c);
        const key = wealthMatchKeyForCandidate(c);
        if (!label || !key) return "";
        const title =
          "재산 공개 명부에 등재된 인원입니다. 클릭하면 재산 상세를 봅니다.";
        const cap = escapeHtml(wealthDetailLinkCaption(label));
        return `<button type="button" data-open-archive-wealth data-archive-wealth="${escapeAttr(key.name)}" data-archive-district="${escapeAttr(key.district)}" class="inline-flex max-w-full items-center gap-0.5 rounded-full border-2 border-black bg-black/20 px-2 py-0.5 text-[10px] font-black leading-none tracking-tight text-slate-200 transition hover:bg-white/10 hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-[#ff4d4d]/20" title="${escapeHtml(title)}"><span class="truncate">${cap}</span>${WEALTH_CHIP_ICON_SM}</button>`;
      }

      function wealthModalSnippet(c) {
        const label = wealthLabelForCandidate(c);
        const key = wealthMatchKeyForCandidate(c);
        if (!label || !key) return "";
        const cap = escapeHtml(wealthDetailLinkCaption(label));
        return modalDetailRow(
          "재산 공개 명부",
          `<button type="button" data-open-archive-wealth data-archive-wealth="${escapeAttr(key.name)}" data-archive-district="${escapeAttr(key.district)}" class="inline-flex w-full max-w-full items-center justify-center gap-1.5 rounded-xl border-2 border-black bg-black/20 px-3 py-2.5 text-left text-sm font-black tracking-tight text-slate-100 transition hover:bg-white/10 hover:text-white focus:outline-none focus-visible:ring-2 focus-visible:ring-[#ff4d4d]/20 sm:w-auto sm:justify-start"><span class="min-w-0 flex-1 leading-snug">${cap}</span>${WEALTH_CHIP_ICON_MD}</button>
          <p class="mt-2 text-xs text-slate-300">재산 공개 데이터에서 이름·자치구가 일치합니다.</p>`
        );
      }

      function modalDetailRow(label, innerHtml) {
        return `<div class="min-w-0 border-b border-white/10 pb-3 last:border-0 last:pb-0">
          <h3 class="text-[11px] font-black uppercase tracking-wide text-slate-300">${escapeHtml(label)}</h3>
          <div class="mt-1.5 text-sm leading-relaxed text-slate-100">${innerHtml}</div>
        </div>`;
      }

      function openCandidateModal(c) {
        const modal = document.getElementById("detailModal");
        const title = document.getElementById("detailModalTitle");
        const body = document.getElementById("detailModalBody");
        const pname = primaryName(c.name);
        const sub = subtitleName(c.name);
        const photo = mergedCandidatePhoto(c)
          ? escapeHtml(mergedCandidatePhoto(c))
          : "";
        const t = partyTheme(c.party);
        const age = ageSummary(c.age);
        const gender = escapeHtml(c.gender || "—");
        const job = escapeHtml((c.job || "").trim() || "—");

        title.textContent = pname + " · 상세";

        const eduHtml = escapeHtml((c.education || "").trim() || "—").replace(
          /\n/g,
          "<br/>"
        );
        const carHtml = escapeHtml((c.career || "").trim() || "—").replace(
          /\n/g,
          "<br/>"
        );
        const ageHtml = escapeHtml(String(c.age || "").trim() || "—").replace(
          /\n/g,
          "<br/>"
        );

        body.innerHTML = `
          <div class="mb-5 flex gap-4">
            <img src="${photo || DEFAULT_AVATAR}" width="86" height="102" alt="" class="h-[102px] w-[86px] shrink-0 rounded-xl object-cover object-top ring-2 ring-black" />
            <div class="min-w-0">
              <span class="inline-block rounded px-1 py-[3px] text-[11px] font-bold leading-none ${t.badgeSolid}">${escapeHtml(c.party || "정당 미상")}</span>
              <p class="mt-2 flex flex-wrap items-center gap-x-1.5 gap-y-1 text-lg font-black leading-tight text-white">
                <span>${escapeHtml(pname)}</span>${wealthInlineByNameHtml(c)}
              </p>
              ${sub ? `<p class="text-sm text-slate-300">${escapeHtml(sub)}</p>` : ""}
              <p class="mt-2 text-xs text-slate-300">${escapeHtml(String(age))} · ${gender} · ${job}</p>
              <p class="mt-1 text-xs text-slate-400">${candidateModalAreaLineHtml(c)}</p>
            </div>
          </div>
          <div class="space-y-3">
            ${modalDetailRow("주소", escapeHtml((c.address || "").trim() || "—"))}
            ${modalDetailRow("직업", job)}
            ${modalDetailRow("학력", `<span class="whitespace-pre-line">${eduHtml}</span>`)}
            ${modalDetailRow("경력", `<span class="whitespace-pre-line">${carHtml}</span>`)}
            ${modalDetailRow("생년월일(연령)", `<span class="whitespace-pre-line">${ageHtml}</span>`)}
            ${modalDetailRow("전과 기록", formatCriminalBlock(c))}
            ${modalDetailRow("등록일자", escapeHtml(c.regDate || "—"))}
            ${wealthModalSnippet(c)}
          </div>`;

        modal.classList.remove("hidden");
        modal.classList.add("flex");
        document.body.style.overflow = "hidden";
      }

      function closeCandidateModal() {
        const modal = document.getElementById("detailModal");
        modal.classList.add("hidden");
        modal.classList.remove("flex");
        document.body.style.overflow = "";
      }

      function primaryName(raw) {
        if (!raw) return "";
        return String(raw).split("\n")[0].trim();
      }

      function subtitleName(raw) {
        const lines = String(raw || "").split("\n").map((s) => s.trim()).filter(Boolean);
        if (lines.length < 2) return "";
        return lines.slice(1).join(" · ");
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function escapeAttr(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function normalizeSearch(s) {
        return String(s || "")
          .toLowerCase()
          .replace(/\s+/g, "");
      }

      function candidateOffice(c) {
        var o = String((c && c.office) || "구의원").trim();
        return o || "구의원";
      }

      /** 구정감시 재산 공개 data.json 명부에 이름·구가 일치해 재산을 열람할 수 있는 경우(직책 문자열 유무) */
      function hasWealthDisclosureInArchive(c) {
        return !!String(wealthRawPositionForCandidate(c) || "").trim();
      }

      function getIncumbentOnlyChecked() {
        var el = document.getElementById("incumbentOnlyFilter");
        return !!(el && el.checked);
      }

      /** 직무 세그먼트 + 「현직만」(명부 등재·재산 열람 가능) AND */
      function candidateMatchesJobFilters(c) {
        var office = getOfficeFilterValue();
        if (office && candidateOffice(c) !== office) return false;
        if (!getIncumbentOnlyChecked()) return true;
        return hasWealthDisclosureInArchive(c);
      }

      /** 테이블 부가 줄: 구청장은 선거구 생략, 구의원·시의원은 「구 · 선거구」 */
      function candidateListAreaLineHtml(c) {
        var d = escapeHtml(c.district || "—");
        if (candidateOffice(c) === "구청장") {
          return d + ' <span class="font-medium text-slate-500">구청장</span>';
        }
        var off = candidateOffice(c);
        var suf =
          off === "시의원"
            ? ' <span class="font-medium text-slate-500">시의원</span>'
            : "";
        return (
          d +
          '<span class="mx-0.5 text-slate-300">·</span>' +
          escapeHtml(c.constituency || "—") +
          suf
        );
      }

      /** 상세 모달 부가 줄: 구청장은 동일, 그 외는 선거구·직무 표시 */
      function candidateModalAreaLineHtml(c) {
        var d = escapeHtml(c.district || "—");
        if (candidateOffice(c) === "구청장") {
          return d + ' <span class="font-medium text-slate-500">구청장</span>';
        }
        return (
          d +
          " · " +
          escapeHtml(c.constituency || "—") +
          " · " +
          escapeHtml(candidateOffice(c))
        );
      }

      function getOfficeFilterValue() {
        var btn = document.querySelector("#officeFilterSeg button[aria-pressed='true']");
        if (!btn) return "";
        return String(btn.getAttribute("data-office-filter") || "");
      }

      function setOfficeSegVisual(value) {
        var root = document.getElementById("officeFilterSeg");
        if (!root) return;
        var onCls =
          "office-filter-seg flex-none border-r border-black/60 px-2.5 py-2 text-center text-xs font-black transition-colors last:border-r-0 focus:outline-none focus-visible:z-10 focus-visible:ring-2 focus-visible:ring-[#ff4d4d]/40 focus-visible:ring-inset bg-[#ff4d4d] text-white hover:bg-[#ff4d4d]/90 sm:px-3";
        var offCls =
          "office-filter-seg flex-none border-r border-black/60 px-2.5 py-2 text-center text-xs font-black transition-colors last:border-r-0 focus:outline-none focus-visible:z-10 focus-visible:ring-2 focus-visible:ring-[#ff4d4d]/40 focus-visible:ring-inset bg-black/20 text-slate-100 hover:bg-white/10 sm:px-3";
        root.querySelectorAll("button[data-office-filter]").forEach(function (b) {
          var v = String(b.getAttribute("data-office-filter") || "");
          var on = v === value;
          b.setAttribute("aria-pressed", on ? "true" : "false");
          b.className = on ? onCls : offCls;
        });
      }

      function parseCandidatesPayload(data) {
        if (Array.isArray(data)) {
          return { list: data, updatedAt: null };
        }
        if (
          data &&
          typeof data === "object" &&
          Array.isArray(data.candidates)
        ) {
          return {
            list: data.candidates,
            updatedAt:
              typeof data.updatedAt === "string" ? data.updatedAt : null,
          };
        }
        throw new Error(
          "JSON은 후보 배열이거나 { updatedAt, candidates } 형식이어야 합니다."
        );
      }

      function formatUpdatedAtKo(iso) {
        if (!iso) return "";
        try {
          const d = new Date(iso);
          if (Number.isNaN(d.getTime())) return "";
          return (
            "자료 갱신: " +
            new Intl.DateTimeFormat("ko-KR", {
              dateStyle: "medium",
              timeStyle: "short",
              timeZone: "Asia/Seoul",
            }).format(d)
          );
        } catch {
          return "";
        }
      }

      function setDataUpdatedLine(iso) {
        const el = document.getElementById("dataUpdatedLine");
        const text = formatUpdatedAtKo(iso);
        if (!text) {
          el.textContent = "";
          el.classList.add("hidden");
          return;
        }
        el.textContent = text;
        el.classList.remove("hidden");
      }

      let allCandidates = [];

      function fillDistrictSelect() {
        const sel = document.getElementById("district");
        SEOUL_DISTRICTS.forEach((d) => {
          const opt = document.createElement("option");
          opt.value = d;
          opt.textContent = d;
          sel.appendChild(opt);
        });
      }

      function fillPartySelect() {
        const sel = document.getElementById("party");
        const prev = sel.value;
        sel.querySelectorAll("option:not([value=''])").forEach((o) => o.remove());
        const names = new Set();
        allCandidates.forEach((c) => {
          if (!candidateMatchesJobFilters(c)) return;
          const p = String(c.party ?? "").trim();
          if (p) names.add(p);
        });
        Array.from(names)
          .sort((a, b) => a.localeCompare(b, "ko"))
          .forEach((p) => {
            const opt = document.createElement("option");
            opt.value = p;
            opt.textContent = p;
            sel.appendChild(opt);
          });
        if (prev && [...sel.options].some((o) => o.value === prev)) sel.value = prev;
      }

      function mergedCandidatePhoto(c) {
        return (c && c.photo) || "";
      }

      function sortCandidatesByKey(candidates, sortKey, sortAsc) {
        return candidates.slice().sort(function (a, b) {
          const nameCmp = primaryName(a.name).localeCompare(primaryName(b.name), "ko");
          if (sortKey === "name") {
            const c = primaryName(a.name).localeCompare(primaryName(b.name), "ko");
            return sortAsc ? c : -c;
          }
          if (sortKey === "age") {
            const na = sortableAgeYears(a.age);
            const nb = sortableAgeYears(b.age);
            if (na == null && nb == null) return nameCmp;
            if (na == null) return 1;
            if (nb == null) return -1;
            const d = sortAsc ? na - nb : nb - na;
            if (d !== 0) return d;
            return nameCmp;
          }
          if (sortKey === "criminal") {
            const ra = criminalSortRank(a);
            const rb = criminalSortRank(b);
            if (ra !== rb) return sortAsc ? ra - rb : rb - ra;
            const ta = String(a.criminal ?? "").trim();
            const tb = String(b.criminal ?? "").trim();
            const c = ta.localeCompare(tb, "ko");
            if (c !== 0) return sortAsc ? c : -c;
            return nameCmp;
          }
          if (sortKey === "office") {
            const oa = candidateOffice(a);
            const ob = candidateOffice(b);
            const c = oa.localeCompare(ob, "ko");
            if (c !== 0) return sortAsc ? c : -c;
            return nameCmp;
          }
          if (sortKey === "constituency") {
            const ca = String(a.constituency || "").trim();
            const cb = String(b.constituency || "").trim();
            const c = ca.localeCompare(cb, "ko");
            if (c !== 0) return sortAsc ? c : -c;
            return nameCmp;
          }
          return 0;
        });
      }

      function render(resetPaging) {
        if (resetPaging !== false) visibleRowCount = LIST_PAGE_SIZE;
        const district = document.getElementById("district").value;
        const party = document.getElementById("party").value;
        const office = getOfficeFilterValue();
        const incumbentOnly = getIncumbentOnlyChecked();
        const q = normalizeSearch(document.getElementById("nameQuery").value);
        const list = document.getElementById("cardList");
        const countLabel = document.getElementById("countLabel");
        const loadMoreWrap = document.getElementById("candidatesLoadMoreWrap");

        const filtered = allCandidates.filter((c) => {
          if (district && c.district !== district) return false;
          if (party && String(c.party ?? "").trim() !== party) return false;
          if (!candidateMatchesJobFilters(c)) return false;
          if (!q) return true;
          return normalizeSearch(c.name).includes(q);
        });

        const usingFilter = Boolean(district || party || q || office || incumbentOnly);
        countLabel.textContent = usingFilter
          ? `표시 ${filtered.length}명 / 전체 ${allCandidates.length}명`
          : `전체 ${filtered.length}명`;

        updateCandidatesStatsPanel(filtered);

        ["name", "age", "criminal", "office", "constituency"].forEach(function (key) {
          document
            .querySelectorAll('[data-sort-scope="main"][data-sort-icon-for="' + key + '"]')
            .forEach(function (el) {
              if (mainSortKey === key) {
                el.textContent = mainSortAsc ? "↑" : "↓";
                el.classList.remove("invisible");
              } else {
                el.textContent = "";
                el.classList.add("invisible");
              }
            });
        });

        const sorted = sortCandidatesByKey(filtered, mainSortKey, mainSortAsc);
        lastFilteredCandidates = sorted;

        const slice = sorted.slice(0, visibleRowCount);
        const remaining = sorted.length - slice.length;
        if (loadMoreWrap) {
          loadMoreWrap.innerHTML =
            remaining > 0
              ? `<div class="flex justify-center bg-black/10 px-4 py-4">
  <button type="button" id="candidatesLoadMore" class="pixel-nav-btn inline-flex items-center justify-center rounded-lg px-4 py-2 text-sm transition">
    더보기 <span class="font-normal text-slate-200">(${remaining}명 더)</span>
  </button>
</div>`
              : "";
        }

        const extIcon = `<svg class="h-3 w-3 shrink-0 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>`;

        list.innerHTML = slice
          .map(function (c, i) {
            const t = partyTheme(c.party);
            const pname = primaryName(c.name);
            const photo = mergedCandidatePhoto(c)
              ? escapeHtml(mergedCandidatePhoto(c))
              : "";
            const jobShort = elide(c.job, 26) || "—";
            const eduCell = escapeHtml(educationFirstLine(c.education));
            const crimCell = escapeHtml(criminalTableCell(c));
            const necHref = c.huboId
              ? escapeHtml(necPreHuboDetailUrl(c.huboId))
              : "";
            const necLink = necHref
              ? `<a href="${necHref}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center rounded-md p-0.5 text-slate-200 hover:bg-white/10 hover:text-white" title="선관위 후보 상세 보기" aria-label="선관위 후보 상세 보기">${extIcon}</a>`
              : `<span class="inline-flex cursor-not-allowed items-center rounded-md p-0.5 text-white/25" title="후보 식별자 없음" aria-label="후보 식별자 없음">${extIcon}</span>`;
            const wealthByName = wealthInlineByNameHtml(c);
            return `<tr data-row-detail="${i}" class="cursor-pointer border-b border-white/10 transition hover:bg-white/5">
              <td class="py-3 pl-4 pr-2 align-top">
                <div class="flex gap-3">
                  <div class="relative h-10 w-10 shrink-0 overflow-hidden rounded-full bg-black/20 ring-2 ring-black">
                    <img src="${photo || DEFAULT_AVATAR}" alt="" width="40" height="40" class="h-full w-full object-cover object-top" loading="lazy" onerror="this.onerror=null;this.src='${DEFAULT_AVATAR}'" />
                  </div>
                  <div class="min-w-0">
                    <p class="flex flex-wrap items-center gap-x-1 gap-y-1 font-black leading-tight text-white">
                      <span>${escapeHtml(pname)}</span>${necLink}
                    </p>
                    ${wealthByName ? `<div class="mt-1">${wealthByName}</div>` : ""}
                  </div>
                </div>
              </td>
              <td class="whitespace-nowrap px-3 py-3 align-middle">
                <span class="inline-flex whitespace-nowrap items-center rounded px-1.5 py-[3px] text-[10px] font-bold leading-none ${t.badgeSolid}">${escapeHtml(c.party || "정당 미상")}</span>
              </td>
              <td class="whitespace-nowrap px-3 py-3 align-middle text-xs font-black text-slate-100">${escapeHtml(
                candidateOffice(c)
              )}</td>
              <td class="whitespace-nowrap px-3 py-3 align-middle text-xs text-slate-300">${escapeHtml(
                c.constituency || "—"
              )}</td>
              <td class="whitespace-nowrap px-3 py-3 align-middle text-xs leading-snug text-slate-300">${escapeHtml(ageSummary(c.age))}</td>
              <td class="whitespace-nowrap px-3 py-3 align-middle text-xs leading-snug text-slate-300">${escapeHtml(c.gender || "—")}</td>
              <td class="max-w-[8rem] px-3 py-3 align-middle text-xs leading-snug text-slate-300">${escapeHtml(jobShort)}</td>
              <td class="max-w-[14rem] px-3 py-3 align-middle text-xs leading-snug text-slate-300">${eduCell}</td>
              <td class="max-w-[6rem] px-3 py-3 align-middle text-xs text-slate-300">${crimCell}</td>
            </tr>`;
          })
          .join("");
      }

      function showError(msg) {
        const box = document.getElementById("errorBox");
        box.textContent = msg;
        box.classList.remove("hidden");
      }

      fillDistrictSelect();

      document.getElementById("cardList").addEventListener("click", function (e) {
        var t = e.target;
        var el = t.nodeType === 3 ? t.parentElement : t;
        if (el && el.closest && el.closest("a[href]")) return;
        if (el && el.closest && el.closest("[data-open-archive-wealth]")) return;
        var row = el && el.closest ? el.closest("tr[data-row-detail]") : null;
        if (!row) return;
        const i = parseInt(row.getAttribute("data-row-detail"), 10);
        if (!Number.isNaN(i) && lastFilteredCandidates[i]) {
          openCandidateModal(lastFilteredCandidates[i]);
        }
      });

      document.querySelectorAll("[data-modal-close], [data-modal-backdrop]").forEach(function (el) {
        el.addEventListener("click", closeCandidateModal);
      });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") closeCandidateModal();
      });

      document.getElementById("officeFilterSeg").addEventListener("click", function (e) {
        var btn = e.target.closest("button[data-office-filter]");
        if (!btn || !btn.closest("#officeFilterSeg")) return;
        var v = String(btn.getAttribute("data-office-filter") || "");
        setOfficeSegVisual(v);
        fillPartySelect();
        render(true);
      });

      document.getElementById("district").addEventListener("change", function () {
        render(true);
      });
      document.getElementById("party").addEventListener("change", function () {
        render(true);
      });
      document.getElementById("nameQuery").addEventListener("input", function () {
        render(true);
      });

      var incumbentOnlyEl = document.getElementById("incumbentOnlyFilter");
      if (incumbentOnlyEl) {
        incumbentOnlyEl.addEventListener("change", function () {
          fillPartySelect();
          render(true);
        });
      }

      function resetFilters() {
        document.getElementById("district").value = "";
        document.getElementById("nameQuery").value = "";
        setOfficeSegVisual("");
        var inc = document.getElementById("incumbentOnlyFilter");
        if (inc) inc.checked = false;
        mainSortKey = "name";
        mainSortAsc = true;
        fillPartySelect();
        document.getElementById("party").value = "";
        render(true);
      }

      document.getElementById("filterResetBtn").addEventListener("click", function () {
        resetFilters();
      });

      document.getElementById("candidatesLoadMoreWrap").addEventListener("click", function (e) {
        var btn = e.target && e.target.closest && e.target.closest("#candidatesLoadMore");
        if (!btn) return;
        visibleRowCount += LIST_PAGE_SIZE;
        render(false);
      });
      function setSort(scope, key) {
        if (mainSortKey === key) mainSortAsc = !mainSortAsc;
        else {
          mainSortKey = key;
          mainSortAsc = true;
        }
        render(true);
      }
      document.addEventListener("click", function (e) {
        var btn = e.target.closest("[data-sort-key]");
        if (!btn) return;
        var key = String(btn.getAttribute("data-sort-key") || "").trim();
        var scope = String(btn.getAttribute("data-sort-scope") || "main").trim();
        if (!key) return;
        if (scope !== "main") return;
        setSort(scope, key);
      });

      const wealthFetch = fetch("../data.json")
        .then((r) => (r.ok ? r.json() : null))
        .catch(() => null);
      const candidatesFetch = fetch("../public/data/candidates.json").then((r) => {
        if (!r.ok) throw new Error(`candidates.json HTTP ${r.status}`);
        return r.json();
      });
      Promise.all([candidatesFetch, wealthFetch])
        .then((results) => {
          const candidatesPayload = results[0];
          const wealthData = results[1];
          buildWealthIndex(wealthData);

          const parsed = parseCandidatesPayload(candidatesPayload);
          allCandidates = parsed.list;

          document.getElementById("errorBox").classList.add("hidden");
          setDataUpdatedLine(parsed.updatedAt);
          fillPartySelect();
          render();
        })
        .catch((e) => {
          showError(
                "데이터를 불러오지 못했습니다. 로컬 서버로 열었는지 확인하세요. (예: 프로젝트 루트에서 npx serve . 후 /candidates/list.html) — " +
              (e && e.message ? e.message : String(e))
          );
          document.getElementById("countLabel").textContent = "0명";
        });
    </script>
  </body>
</html>
