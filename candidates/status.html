    <script>
      (function () {
        const SHEET_CSV_URL =
          "https://docs.google.com/spreadsheets/d/1vWnrVF0wdJyhL6OnEZh3LpXNQnc3owKYovrd5jo6jfY/gviz/tq?tqx=out:csv";
        const SHEET_VIEW_URL =
          "https://docs.google.com/spreadsheets/d/1vWnrVF0wdJyhL6OnEZh3LpXNQnc3owKYovrd5jo6jfY/edit";

        const CONTACT_DEFS = [
          { key: "phone", labels: ["전화번호"], icon: "bi-telephone" },
          { key: "email", labels: ["이메일"], icon: "bi-envelope" },
          { key: "facebook", labels: ["페이스북"], icon: "bi-facebook" },
          { key: "instagram", labels: ["인스타그램"], icon: "bi-instagram" },
          { key: "twitter", labels: ["트위터(X)", "트위터"], icon: "bi-twitter-x" },
          { key: "youtube", labels: ["유튜브"], icon: "bi-youtube" },
          { key: "blog", labels: ["블로그"], icon: "bi-journal-text" },
          { key: "homepage", labels: ["홈페이지"], icon: "bi-globe" },
        ];

        const SEOUL_DISTRICTS = [
          "종로구",
          "중구",
          "용산구",
          "성동구",
          "광진구",
          "동대문구",
          "중랑구",
          "성북구",
          "강북구",
          "도봉구",
          "노원구",
          "은평구",
          "서대문구",
          "마포구",
          "양천구",
          "강서구",
          "구로구",
          "금천구",
          "영등포구",
          "동작구",
          "관악구",
          "서초구",
          "강남구",
          "송파구",
          "강동구",
        ];
        const SEOUL_MAP_TOPOJSON_URL = "../public/data/seoul_municipalities_topo_simple.json";

        function escapeHtml(str) {
          return String(str ?? "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/\"/g, "&quot;")
            .replace(/'/g, "&#039;");
        }

        function normalizeLooseText(s) {
          return String(s ?? "")
            .trim()
            .toLowerCase()
            .replace(/\s+/g, "");
        }

        function normalizeDistrictName(s) {
          const t = String(s ?? "").trim();
          if (!t) return "";
          return t.replace(/\s+/g, "");
        }

        function primaryName(name) {
          const t = String(name ?? "").trim();
          if (!t) return "";
          return t.split("(")[0].trim().split(/\s+/)[0].trim();
        }

        function parseCandidatesPayload(data) {
          if (Array.isArray(data)) return { list: data, updatedAt: null };
          if (data && typeof data === "object" && Array.isArray(data.candidates)) {
            return {
              list: data.candidates,
              updatedAt: typeof data.updatedAt === "string" ? data.updatedAt : null,
            };
          }
          throw new Error("candidates.json 형식이 올바르지 않습니다.");
        }

        // Minimal CSV parser that handles quoted commas/newlines.
        function parseCsv(text) {
          const rows = [];
          let row = [];
          let cur = "";
          let i = 0;
          let inQuotes = false;
          const s = String(text ?? "");
          while (i < s.length) {
            const ch = s[i];
            if (inQuotes) {
              if (ch === '"') {
                if (s[i + 1] === '"') {
                  cur += '"';
                  i += 2;
                  continue;
                }
                inQuotes = false;
                i += 1;
                continue;
              }
              cur += ch;
              i += 1;
              continue;
            }
            if (ch === '"') {
              inQuotes = true;
              i += 1;
              continue;
            }
            if (ch === ",") {
              row.push(cur);
              cur = "";
              i += 1;
              continue;
            }
            if (ch === "\n") {
              row.push(cur);
              cur = "";
              rows.push(row);
              row = [];
              i += 1;
              continue;
            }
            if (ch === "\r") {
              i += 1;
              continue;
            }
            cur += ch;
            i += 1;
          }
          row.push(cur);
          rows.push(row);
          return rows;
        }

        function csvToObjects(text) {
          const table = parseCsv(text);
          const header = (table[0] || []).map((h) => String(h || "").trim());
          return table
            .slice(1)
            .map((r) => {
              const obj = {};
              header.forEach((h, idx) => {
                obj[h] = r[idx] == null ? "" : r[idx];
              });
              return obj;
            })
            .filter((o) => Object.values(o).some((v) => String(v || "").trim() !== ""));
        }

        function findSheetColumn(row, candidates) {
          const keys = Object.keys(row || {});
          for (const c of candidates) {
            const exact = keys.find((k) => k === c);
            if (exact) return exact;
          }
          for (const c of candidates) {
            const contains = keys.find((k) => k.includes(c));
            if (contains) return contains;
          }
          return "";
        }

        function hasAnyContactInfo(row) {
          if (!row || typeof row !== "object") return false;
          return CONTACT_DEFS.some((def) => {
            const col = findSheetColumn(row, def.labels);
            if (!col) return false;
            return String(row[col] || "").trim() !== "";
          });
        }

        function extractContactBadges(row) {
          if (!row || typeof row !== "object") return [];
          const out = [];
          CONTACT_DEFS.forEach((def) => {
            const col = findSheetColumn(row, def.labels);
            if (!col) return;
            const v = String(row[col] || "").trim();
            if (!v) return;
            out.push({
              key: def.key,
              icon: def.icon,
              label: def.labels[0],
            });
          });
          return out;
        }

        function rateToColor(pct) {
          const v = typeof pct === "number" ? pct : 0;
          if (v <= 0) return "url(#fogDots)";
          if (v <= 30) return "#3b82f6";
          if (v <= 70) return "#facc15";
          return "#ff4d4d";
        }

        function setOverallBar(pct) {
          const bar = document.getElementById("overallBar");
          if (!bar) return;
          const p = Math.max(0, Math.min(100, pct));
          bar.style.width = p.toFixed(1) + "%";
          bar.setAttribute("aria-valuenow", p.toFixed(1));
        }

        function tooltipShow(x, y, html) {
          const tip = document.getElementById("mapTooltip");
          if (!tip) return;
          tip.innerHTML = html;
          tip.classList.remove("hidden");
          tip.setAttribute("aria-hidden", "false");
          const pad = 10;
          const rect = tip.getBoundingClientRect();
          let left = x + 12;
          let top = y + 12;
          if (left + rect.width + pad > window.innerWidth) left = window.innerWidth - rect.width - pad;
          if (top + rect.height + pad > window.innerHeight) top = window.innerHeight - rect.height - pad;
          tip.style.left = left + "px";
          tip.style.top = top + "px";
        }

        function tooltipHide() {
          const tip = document.getElementById("mapTooltip");
          if (!tip) return;
          tip.classList.add("hidden");
          tip.setAttribute("aria-hidden", "true");
        }

        let lastMapTouchAt = 0;
        function mapTouchRecentlyActive() {
          return Date.now() - lastMapTouchAt < 3000;
        }

        function chipTooltipHide() {
          const tip = document.getElementById("chipTooltip");
          if (!tip) return;
          tip.classList.add("hidden");
          tip.setAttribute("aria-hidden", "true");
        }

        function chipTooltipShow(x, y, html) {
          const tip = document.getElementById("chipTooltip");
          if (!tip) return;
          tip.innerHTML = html;
          tip.classList.remove("hidden");
          tip.setAttribute("aria-hidden", "false");
          const pad = 10;
          const rect = tip.getBoundingClientRect();
          let left = x + 12;
          let top = y + 12;
          if (left + rect.width + pad > window.innerWidth) left = window.innerWidth - rect.width - pad;
          if (top + rect.height + pad > window.innerHeight) top = window.innerHeight - rect.height - pad;
          tip.style.left = left + "px";
          tip.style.top = top + "px";
        }

        function buildSeoulMap(topoJson, statsByDistrict) {
          const mapSvg = document.getElementById("seoulMap");
          const g = document.getElementById("mapPaths");
          if (!mapSvg || !g) return;
          if (!window.d3 || !window.topojson) return;

          const width = 520;
          const height = 520;

          const objKey = topoJson && topoJson.objects ? Object.keys(topoJson.objects)[0] : "";
          if (!objKey) throw new Error("TopoJSON objects not found");
          const featureCollection = window.topojson.feature(topoJson, topoJson.objects[objKey]);
          const features = (featureCollection && featureCollection.features) || [];

          const projection = window.d3.geoMercator();
          projection.fitSize([width, height], featureCollection);
          const path = window.d3.geoPath(projection);

          // Clear
          g.innerHTML = "";

          // Draw paths
          const frag = document.createDocumentFragment();
          features.forEach((f) => {
            const name = f && f.properties ? String(f.properties.name || "").trim() : "";
            const st = statsByDistrict[name] || { total: 0, done: 0, pct: 0 };
            const p = document.createElementNS("http://www.w3.org/2000/svg", "path");
            p.setAttribute("d", path(f) || "");
            p.setAttribute("fill", rateToColor(st.pct));
            p.setAttribute("stroke", "#000");
            p.setAttribute("stroke-width", "3");
            p.setAttribute("stroke-linejoin", "miter");
            p.setAttribute("stroke-linecap", "square");
            p.setAttribute("vector-effect", "non-scaling-stroke");
            p.setAttribute("data-district", name);
            p.setAttribute("tabindex", "-1");
            p.style.cursor = "pointer";
            p.style.outline = "none";
            if (st.pct >= 71) p.classList.add("is-hot");
            frag.appendChild(p);
          });
          g.appendChild(frag);

          // Interactions
          g.querySelectorAll("path[data-district]").forEach((el) => {
            el.addEventListener("click", () => {
              // 클릭 후 포커스가 남아 테두리가 뜨는 것 방지
              if (el && typeof el.blur === "function") el.blur();
            });
            el.addEventListener("pointermove", (e) => {
              if (e && e.pointerType === "touch") return;
              const d = el.getAttribute("data-district") || "";
              const st = statsByDistrict[d] || { total: 0, done: 0, pct: 0 };
              tooltipShow(
                e.clientX,
                e.clientY,
                `<div class="font-semibold text-white">${escapeHtml(d)}</div>
                 <div class="mt-0.5 text-slate-200">${st.total}중 ${st.done}명 확인 (${st.pct.toFixed(0)}%)</div>`
              );
            });
            el.addEventListener("pointerleave", () => {
              // 모바일에서 손을 떼는 순간 pointerleave/focus가 섞여 들어오는 경우가 있어,
              // 터치 직후에는 숨김을 막는다.
              if (mapTouchRecentlyActive()) return;
              tooltipHide();
            });
            el.addEventListener("pointercancel", () => {
              if (mapTouchRecentlyActive()) return;
              tooltipHide();
            });
            el.addEventListener("focus", () => {
              if (mapTouchRecentlyActive()) return;
              tooltipHide();
            });
            el.addEventListener("pointerdown", (e) => {
              if (!e || e.pointerType !== "touch") return;
              lastMapTouchAt = Date.now();
              const d = el.getAttribute("data-district") || "";
              const st = statsByDistrict[d] || { total: 0, done: 0, pct: 0 };
              tooltipShow(
                e.clientX,
                e.clientY,
                `<div class="font-semibold text-white">${escapeHtml(d)}</div>
                 <div class="mt-0.5 text-slate-200">${st.total}중 ${st.done}명 확인 (${st.pct.toFixed(0)}%)</div>`
              );
              setTimeout(() => {
                if (!mapTouchRecentlyActive()) tooltipHide();
              }, 2500);
            });
          });
        }

        function renderDistrictList(statsByDistrict, candidatesByDistrictOffice) {
          const list = document.getElementById("districtList");
          if (!list) return;
          const rows = SEOUL_DISTRICTS.map((d) => statsByDistrict[d] || { district: d, total: 0, done: 0, pct: 0 });
          rows.sort((a, b) => (a.pct - b.pct) || a.district.localeCompare(b.district, "ko"));
          function districtStatus(st) {
            if (!st || !st.total) return "NULL";
            if (!st.done) return "NULL";
            if (st.pct >= 71) return "READY";
            return "NEED_DATA";
          }
          function statusBadgeHtml(status) {
            const base =
              "mono inline-flex shrink-0 items-center rounded-full px-2 py-0.5 text-[10px] font-bold ring-1";
            if (status === "READY") {
              return `<span class="${base} bg-emerald-400/10 text-emerald-200 ring-emerald-400/20">READY</span>`;
            }
            if (status === "NEED_DATA") {
              return `<span class="${base} bg-sky-400/10 text-sky-200 ring-sky-400/20">NEED_DATA</span>`;
            }
            return `<span class="${base} bg-white/5 text-slate-200 ring-white/10">NULL</span>`;
          }
          function sectionHtml(title, items) {
            const chips = (items || [])
              .map((it) => {
                const base =
                  "inline-flex items-center rounded-full px-2 py-1 text-[11px] leading-none ring-1 transition-colors";
                const cls = it.collected
                  ? "bg-[#ff4d4d]/15 text-[#ffb3b3] ring-[#ff4d4d]/30 hover:bg-[#ff4d4d]/25"
                  : "bg-white/5 text-slate-300 ring-white/10 hover:bg-white/10";
                const tip = escapeHtml(it.tooltip || "");
                return `<span class="${base} ${cls}" data-chip-tooltip="${escapeHtml(
                  JSON.stringify({ name: it.name, collected: it.collected, badges: it.badges })
                )}">${escapeHtml(it.name)}</span>`;
              })
              .join("");
            return `<div class="mt-2">
              <div class="text-[11px] font-semibold text-slate-300">${escapeHtml(title)}</div>
              <div class="mt-1 flex flex-wrap gap-1.5">${chips || '<span class="text-[11px] text-slate-500">—</span>'}</div>
            </div>`;
          }

          list.innerHTML = rows
            .map((r) => {
              const bar = Math.max(0, Math.min(100, r.pct));
              const c = rateToColor(r.pct);
              const status = districtStatus(r);
              const bundles = candidatesByDistrictOffice[r.district] || {};
              const mayor = bundles["구청장"] || [];
              const city = bundles["시의원"] || [];
              const gu = bundles["구의원"] || [];
              return `<li class="dash-card dash-in rounded-3xl p-4 shadow-2xl shadow-black/20" style="animation-delay: 520ms">
                <details class="group">
                  <summary class="flex cursor-pointer list-none items-center justify-between gap-3 py-1 marker:content-none">
                    <div class="min-w-0 flex-1">
                      <div class="flex items-baseline gap-2">
                        <span class="truncate text-[13px] font-bold leading-tight text-white">${escapeHtml(
                          r.district
                        )}</span>
                        ${statusBadgeHtml(status)}
                        ${
                          status === "NULL"
                            ? '<span class="mono text-[10px] font-semibold text-slate-400 animate-pulse">Scanning...</span>'
                            : ""
                        }
                        <span class="mono shrink-0 text-[10px] font-semibold leading-none text-slate-200">${r.pct.toFixed(
                          0
                        )}%</span>
                        <span class="mono shrink-0 text-[10px] leading-none text-slate-400">(${r.done}/${r.total})</span>
                      </div>
                      <div class="mt-2 h-1 w-full max-w-[420px] overflow-hidden rounded-full bg-white/10 ring-1 ring-white/10">
                        <div class="h-full rounded-full" style="width:${bar.toFixed(1)}%; background:${c};"></div>
                      </div>
                    </div>
                    <span class="shrink-0 text-slate-400 group-open:rotate-180 transition-transform">
                      <i class="bi bi-chevron-down"></i>
                    </span>
                  </summary>
                  <div class="pb-2 pt-1">
                    ${sectionHtml("구청장 후보", mayor)}
                    ${sectionHtml("시의원 후보", city)}
                    ${sectionHtml("구의원 후보", gu)}
                  </div>
                </details>
              </li>`;
            })
            .join("");
        }

        async function inject(id, url) {
          try {
            const r = await fetch(url);
            if (!r.ok) return;
            const el = document.getElementById(id);
            if (el) el.innerHTML = await r.text();
          } catch (e) {
            console.warn("[status] 헤더·푸터 로드:", e);
          }
        }

        function highlightCandidatesSubnav() {
          // 기존 서브네비 하이라이트 로직과 충돌 방지: status는 별도 페이지라 active 변경 안 함
        }

        function setUpdatedLine(updatedAt) {
          const el = document.getElementById("overallUpdated");
          if (!el) return;
          if (!updatedAt) {
            el.textContent = "—";
            return;
          }
          el.textContent = String(updatedAt);
        }

        async function main() {
          document.getElementById("sheetLinkTop").href = SHEET_VIEW_URL;

          const candidatesFetch = fetch("../public/data/candidates.json").then((r) => r.json());
          const sheetFetch = fetch(SHEET_CSV_URL, { cache: "no-store" }).then((r) => r.text());
          const topoFetch = fetch(SEOUL_MAP_TOPOJSON_URL).then((r) => r.json());
          const [candidatesPayload, sheetCsv, topoJson] = await Promise.all([
            candidatesFetch,
            sheetFetch,
            topoFetch,
          ]);

          const parsed = parseCandidatesPayload(candidatesPayload);
          setUpdatedLine(parsed.updatedAt);

          const sheetRows = csvToObjects(sheetCsv);
          const nameCol = sheetRows.length ? findSheetColumn(sheetRows[0], ["이름", "성명"]) : "";
          const distCol = sheetRows.length ? findSheetColumn(sheetRows[0], ["지역구", "자치구", "구"]) : "";

          const contactByKey = new Map();
          sheetRows.forEach((row) => {
            const name = nameCol ? String(row[nameCol] || "").trim() : "";
            const dist = distCol ? String(row[distCol] || "").trim() : "";
            if (!name || !dist) return;
            const key = normalizeLooseText(primaryName(name)) + "|" + normalizeDistrictName(dist);
            const badges = extractContactBadges(row);
            // sheet에 같은 키가 여러 줄 있으면 합집합
            const prev = contactByKey.get(key);
            if (prev) {
              const merged = {};
              prev.badges.forEach((b) => (merged[b.key] = b));
              badges.forEach((b) => (merged[b.key] = b));
              const mergedArr = Object.values(merged);
              contactByKey.set(key, { badges: mergedArr, collected: mergedArr.length > 0 });
            } else {
              contactByKey.set(key, { badges, collected: badges.length > 0 });
            }
          });

          const statsByDistrict = {};
          SEOUL_DISTRICTS.forEach((d) => {
            statsByDistrict[d] = { district: d, total: 0, done: 0, pct: 0 };
          });

          let totalAll = 0;
          let doneAll = 0;

          parsed.list.forEach((c) => {
            const d = normalizeDistrictName(c.district);
            if (!statsByDistrict[d]) return;
            statsByDistrict[d].total += 1;
            totalAll += 1;
            const key = normalizeLooseText(primaryName(c.name)) + "|" + d;
            const sheetMeta = contactByKey.get(key);
            if (sheetMeta && sheetMeta.collected) {
              statsByDistrict[d].done += 1;
              doneAll += 1;
            }
          });

          Object.values(statsByDistrict).forEach((st) => {
            st.pct = st.total ? (st.done / st.total) * 100 : 0;
          });

          const overallPct = totalAll ? (doneAll / totalAll) * 100 : 0;
          document.getElementById("overallPct").textContent = "HP: " + overallPct.toFixed(0) + "%";
          document.getElementById("overallCount").textContent = "SCORE: " + doneAll + "/" + totalAll;
          setOverallBar(overallPct);

          const metricCovered = document.getElementById("metricCovered");
          const metricTotal = document.getElementById("metricTotal");
          const metricCoveredPct = document.getElementById("metricCoveredPct");
          const metricDistricts = document.getElementById("metricDistricts");
          if (metricCovered) metricCovered.textContent = String(doneAll);
          if (metricTotal) metricTotal.textContent = "/ " + String(totalAll);
          if (metricCoveredPct) metricCoveredPct.textContent = "HP: " + overallPct.toFixed(0) + "%";
          if (metricDistricts) metricDistricts.textContent = SEOUL_DISTRICTS.length + " districts";

          let ready = 0;
          let need = 0;
          let nul = 0;
          Object.values(statsByDistrict).forEach((st) => {
            if (!st.total || !st.done) {
              nul += 1;
            } else if (st.pct >= 71) {
              ready += 1;
            } else {
              need += 1;
            }
          });
          const metricReady = document.getElementById("metricReady");
          const metricNeed = document.getElementById("metricNeed");
          const metricNull = document.getElementById("metricNull");
          if (metricReady) metricReady.textContent = String(ready);
          if (metricNeed) metricNeed.textContent = String(need);
          if (metricNull) metricNull.textContent = String(nul);

          buildSeoulMap(topoJson, statsByDistrict);
          const candidatesByDistrictOffice = {};
          SEOUL_DISTRICTS.forEach((d) => {
            candidatesByDistrictOffice[d] = { 구청장: [], 시의원: [], 구의원: [] };
          });
          parsed.list.forEach((c) => {
            const dist = normalizeDistrictName(c.district);
            if (!candidatesByDistrictOffice[dist]) return;
            const office = String(c.office || "").trim();
            if (!candidatesByDistrictOffice[dist][office]) return;
            const name = primaryName(c.name);
            const key = normalizeLooseText(name) + "|" + dist;
            const meta = contactByKey.get(key);
            const collected = meta ? !!meta.collected : false;
            const badges = meta ? meta.badges : [];
            candidatesByDistrictOffice[dist][office].push({
              name,
              collected,
              badges,
            });
          });
          Object.values(candidatesByDistrictOffice).forEach((bundle) => {
            Object.values(bundle).forEach((arr) => {
              arr.sort((a, b) => a.name.localeCompare(b.name, "ko"));
            });
          });
          renderDistrictList(statsByDistrict, candidatesByDistrictOffice);
        }

        (async function () {
          await inject("header-plugin", "header.html");
          highlightCandidatesSubnav();
          await inject("footer-plugin", "footer.html");
          try {
            await main();
          } catch (e) {
            console.error(e);
            const list = document.getElementById("districtList");
            if (list) {
              list.innerHTML =
                '<li class="px-4 py-6 text-sm text-slate-600">데이터를 불러오지 못했습니다. 로컬 서버로 열었는지 확인하세요. (예: 프로젝트 루트에서 npx serve . 후 /candidates/status.html)</li>';
            }
          }
        })();

        document.addEventListener("keydown", function (e) {
          if (e.key === "Escape") {
            tooltipHide();
            chipTooltipHide();
          }
        });

        // 모바일·DevTools 에뮬에서도 스크롤 시 툴팁이 fixed로 남지 않도록 다중 감지
        function hideTooltipsOnScroll() {
          tooltipHide();
          chipTooltipHide();
        }
        const scrollHideTargets = [window, document, document.documentElement, document.body].filter(Boolean);
        scrollHideTargets.forEach((target) => {
          target.addEventListener("scroll", hideTooltipsOnScroll, { passive: true, capture: true });
        });
        if (window.visualViewport) {
          window.visualViewport.addEventListener("scroll", hideTooltipsOnScroll);
        }
        // scroll 이벤트가 누락되는 환경 대비: 지도 블록이 뷰포트에서 움직이면(스크롤·줌·주소창) 툴팁 제거
        (function setupMapSectionIntersectionHide() {
          const mapSection = document.getElementById("seoulMapSection");
          if (!mapSection || typeof IntersectionObserver === "undefined") return;
          let lastRatio = null;
          const thresholds = [];
          for (let t = 0; t <= 40; t += 1) thresholds.push(t / 40);
          const io = new IntersectionObserver(
            (entries) => {
              const entry = entries[0];
              if (!entry) return;
              const r = entry.intersectionRatio;
              if (lastRatio === null) {
                lastRatio = r;
                return;
              }
              if (Math.abs(r - lastRatio) > 1e-4) {
                lastRatio = r;
                tooltipHide();
              }
            },
            { root: null, threshold: thresholds }
          );
          io.observe(mapSection);
        })();

        const districtListEl = document.getElementById("districtList");
        let lastChipEl = null;

        function chipPayloadFromEl(el) {
          if (!el) return null;
          let payload = null;
          try {
            payload = JSON.parse(el.getAttribute("data-chip-tooltip") || "null");
          } catch {}
          if (!payload || !payload.name) return null;
          return payload;
        }

        function chipTooltipHtml(payload) {
          const badges = Array.isArray(payload.badges) ? payload.badges : [];
          const icons = badges
            .map((b) => {
              const cls = String(b.icon || "").trim();
              const label = String(b.label || "").trim();
              if (!cls) return "";
              return `<span class="inline-flex items-center gap-1 rounded-md bg-white/5 px-2 py-1 ring-1 ring-white/10">
                <i class="bi ${escapeHtml(cls)}" aria-hidden="true"></i>
                <span class="text-[11px] text-slate-200">${escapeHtml(label)}</span>
              </span>`;
            })
            .join("");
          return `<div class="font-semibold text-white">${escapeHtml(payload.name)}</div>
             <div class="mt-1 flex flex-wrap gap-1.5">${
               icons || '<span class="text-[11px] text-slate-400">연락처 없음</span>'
             }</div>`;
        }

        function showChipTooltipAt(el, x, y) {
          const payload = chipPayloadFromEl(el);
          if (!payload) return;
          chipTooltipShow(x, y, chipTooltipHtml(payload));
        }

        if (districtListEl) {
          // Desktop: hover (mouse) keeps existing behavior
          districtListEl.addEventListener("pointermove", function (e) {
            if (e && e.pointerType && e.pointerType !== "mouse") return;
            const t = e.target;
            const el = t && t.closest ? t.closest("[data-chip-tooltip]") : null;
            if (!el) {
              chipTooltipHide();
              lastChipEl = null;
              return;
            }
            lastChipEl = el;
            showChipTooltipAt(el, e.clientX, e.clientY);
          });
          districtListEl.addEventListener("mouseleave", function () {
            chipTooltipHide();
            lastChipEl = null;
          });

          // Mobile: tap (touch/pen) should reliably show tooltip
          districtListEl.addEventListener(
            "pointerdown",
            function (e) {
              if (!e || (e.pointerType !== "touch" && e.pointerType !== "pen")) return;
              const t = e.target;
              const el = t && t.closest ? t.closest("[data-chip-tooltip]") : null;
              if (!el) {
                chipTooltipHide();
                lastChipEl = null;
                return;
              }
              const tip = document.getElementById("chipTooltip");
              const isVisible = tip && !tip.classList.contains("hidden");
              if (isVisible && lastChipEl === el) {
                chipTooltipHide();
                lastChipEl = null;
                return;
              }
              lastChipEl = el;
              const rect = el.getBoundingClientRect();
              const x = typeof e.clientX === "number" && e.clientX ? e.clientX : rect.left + rect.width / 2;
              const y = typeof e.clientY === "number" && e.clientY ? e.clientY : rect.top + rect.height / 2;
              showChipTooltipAt(el, x, y);
            },
            { passive: true }
          );
        }

        // 칩 바깥을 탭하면 칩 툴팁 닫기
        document.addEventListener(
          "pointerdown",
          function (e) {
            const t = e.target;
            const el = t && t.closest ? t.closest("[data-chip-tooltip]") : null;
            if (!el) {
              chipTooltipHide();
              lastChipEl = null;
            }
          },
          { passive: true, capture: true }
        );
      })();
    </script>
  </body>
</html>
