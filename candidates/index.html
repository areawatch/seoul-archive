<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>서울시 구의원 예비후보 — 구·정당·이름 필터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: [
                "Pretendard Variable",
                "Pretendard",
                "-apple-system",
                "BlinkMacSystemFont",
                "system-ui",
                "sans-serif",
              ],
            },
          },
        },
      };
    </script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900 antialiased">
    <div class="mx-auto max-w-6xl px-4 py-10 sm:px-6 lg:px-8">
      <header class="mb-10 text-center sm:text-left">
        <p class="text-sm font-medium uppercase tracking-wider text-slate-500">
          Seoul Archive
        </p>
        <h1 class="mt-1 text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl">
          후보자 목록
        </h1>
        <p class="mt-2 max-w-2xl text-slate-600">
          구·정당·이름으로 실시간 필터링합니다. 데이터는
          <code class="rounded bg-slate-200/80 px-1.5 py-0.5 text-sm"
            >public/data/candidates.json</code
          >
          에서 불러옵니다.
        </p>
        <p
          id="dataUpdatedLine"
          class="mt-2 hidden text-sm text-slate-500"
          aria-live="polite"
        ></p>
      </header>

      <div
        class="mb-8 grid grid-cols-1 gap-4 rounded-2xl border border-slate-200/80 bg-white p-5 shadow-sm sm:grid-cols-2 lg:grid-cols-12 lg:items-end"
      >
        <div class="flex w-full flex-col gap-2 lg:col-span-3">
          <label for="district" class="text-sm font-semibold text-slate-700"
            >구 선택 <span class="font-normal text-slate-500">(25개구)</span></label
          >
          <select
            id="district"
            class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-900 shadow-inner outline-none transition focus:border-blue-400 focus:bg-white focus:ring-2 focus:ring-blue-200"
          >
            <option value="">전체</option>
          </select>
        </div>
        <div class="flex w-full flex-col gap-2 lg:col-span-3">
          <label for="party" class="text-sm font-semibold text-slate-700">정당</label>
          <select
            id="party"
            class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm font-medium text-slate-900 shadow-inner outline-none transition focus:border-blue-400 focus:bg-white focus:ring-2 focus:ring-blue-200"
          >
            <option value="">전체</option>
          </select>
        </div>
        <div class="flex w-full flex-col gap-2 sm:col-span-2 lg:col-span-4">
          <label for="nameQuery" class="text-sm font-semibold text-slate-700"
            >이름 검색</label
          >
          <input
            id="nameQuery"
            type="search"
            placeholder="이름 또는 한자 일부 입력"
            autocomplete="off"
            class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-900 shadow-inner outline-none transition placeholder:text-slate-400 focus:border-blue-400 focus:bg-white focus:ring-2 focus:ring-blue-200"
          />
        </div>
        <p
          id="countLabel"
          class="flex items-end justify-center text-sm text-slate-500 lg:col-span-2 lg:justify-end lg:pb-3"
        >
          불러오는 중…
        </p>
      </div>

      <div
        id="errorBox"
        class="mb-6 hidden rounded-xl border border-amber-200 bg-amber-50 px-4 py-3 text-sm text-amber-900"
        role="alert"
      ></div>

      <ul
        id="cardList"
        class="grid grid-cols-1 gap-5 md:grid-cols-2 2xl:grid-cols-3"
      ></ul>
    </div>

    <div
      id="detailModal"
      class="fixed inset-0 z-[100] hidden items-center justify-center p-4 sm:p-6"
      role="dialog"
      aria-modal="true"
      aria-labelledby="detailModalTitle"
    >
      <div
        class="absolute inset-0 bg-slate-900/50 backdrop-blur-[2px]"
        data-modal-backdrop
        aria-hidden="true"
      ></div>
      <div
        class="relative flex max-h-[min(90vh,720px)] w-full max-w-lg flex-col overflow-hidden rounded-2xl bg-white shadow-2xl ring-1 ring-slate-200"
      >
        <div
          class="flex shrink-0 items-center justify-between gap-3 border-b border-slate-100 px-4 py-3"
        >
          <h2
            id="detailModalTitle"
            class="truncate text-lg font-bold text-slate-900"
          ></h2>
          <button
            type="button"
            class="rounded-lg p-2 text-slate-500 hover:bg-slate-100 hover:text-slate-800"
            data-modal-close
            aria-label="닫기"
          >
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
        <div
          id="detailModalBody"
          class="min-h-0 flex-1 overflow-y-auto px-4 py-4 text-sm"
        ></div>
      </div>
    </div>

    <div
      class="modal fade"
      id="archiveWealthModal"
      tabindex="-1"
      aria-labelledby="archiveWealthModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="archiveWealthModalLabel">재산 상세</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="닫기"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-4" style="height: 250px">
              <canvas id="archiveWealthChart"></canvas>
            </div>
            <div class="text-muted small mb-2">단위: 천원 (채무/부채는 총계에서 감산)</div>
            <div id="archiveWealthContent"></div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="../config.js"></script>
    <script src="../archive-wealth-modal.js"></script>

    <script>
      /* 선관위 예비후보 명부「구시군」선택 순서와 동일 */
      const SEOUL_DISTRICTS = [
        "종로구",
        "중구",
        "용산구",
        "성동구",
        "광진구",
        "동대문구",
        "중랑구",
        "성북구",
        "강북구",
        "도봉구",
        "노원구",
        "은평구",
        "서대문구",
        "마포구",
        "양천구",
        "강서구",
        "구로구",
        "금천구",
        "영등포구",
        "동작구",
        "관악구",
        "서초구",
        "강남구",
        "송파구",
        "강동구",
      ];

      const NEC_ELECTION_ID = "0020260603";

      function criminalShowsRecord(criminal) {
        const t = String(criminal ?? "").trim();
        if (!t || t === "없음") return false;
        if (/^0\s*건$/.test(t)) return false;
        return true;
      }

      function necPreHuboDetailUrl(huboId) {
        const q = new URLSearchParams({
          electionId: NEC_ELECTION_ID,
          huboId: String(huboId),
        });
        return (
          "https://info.nec.go.kr/electioninfo/precandidate_detail_info.xhtml?" +
          q.toString()
        );
      }

      function formatCriminalBlock(c) {
        const label = escapeHtml((c.criminal || "").trim() || "—");
        const hid = c.huboId != null && String(c.huboId).trim() !== "";
        if (!criminalShowsRecord(c.criminal) || !hid) {
          return `<span class="font-medium">${label}</span>`;
        }
        const href = escapeHtml(necPreHuboDetailUrl(c.huboId));
        return `<span class="font-medium">${label}</span>
          <a href="${href}" target="_blank" rel="noopener noreferrer" title="선관위 상세 창에서 「전과」를 누르면 스캔 서류를 볼 수 있습니다." class="ml-2 inline-block font-medium text-blue-700 underline decoration-blue-300 underline-offset-2 hover:text-blue-900">전과 서류 보기</a>`;
      }

      const DEFAULT_AVATAR =
        "data:image/svg+xml," +
        encodeURIComponent(
          `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
            <rect width="120" height="120" fill="#e2e8f0"/>
            <circle cx="60" cy="48" r="22" fill="#94a3b8"/>
            <path d="M24 108c4-28 72-28 72 0" fill="#94a3b8"/>
          </svg>`
        );

      const PARTY_STYLES = {
        더불어민주당: {
          borderL: "border-l-blue-500",
          ring: "ring-blue-100",
          name: "text-blue-700",
          badge: "bg-blue-50 text-blue-800 ring-blue-200",
          badgeSolid: "bg-blue-600 text-white",
          topAccent: "border-t-[3px] border-t-blue-600",
        },
        국민의힘: {
          borderL: "border-l-red-500",
          ring: "ring-red-100",
          name: "text-red-700",
          badge: "bg-red-50 text-red-800 ring-red-200",
          badgeSolid: "bg-red-600 text-white",
          topAccent: "border-t-[3px] border-t-red-600",
        },
        조국혁신당: {
          borderL: "border-l-violet-500",
          ring: "ring-violet-100",
          name: "text-violet-700",
          badge: "bg-violet-50 text-violet-800 ring-violet-200",
          badgeSolid: "bg-violet-600 text-white",
          topAccent: "border-t-[3px] border-t-violet-600",
        },
        개혁신당: {
          borderL: "border-l-cyan-500",
          ring: "ring-cyan-100",
          name: "text-cyan-700",
          badge: "bg-cyan-50 text-cyan-800 ring-cyan-200",
          badgeSolid: "bg-cyan-600 text-white",
          topAccent: "border-t-[3px] border-t-cyan-600",
        },
        진보당: {
          borderL: "border-l-emerald-500",
          ring: "ring-emerald-100",
          name: "text-emerald-700",
          badge: "bg-emerald-50 text-emerald-800 ring-emerald-200",
          badgeSolid: "bg-emerald-600 text-white",
          topAccent: "border-t-[3px] border-t-emerald-600",
        },
        무소속: {
          borderL: "border-l-slate-400",
          ring: "ring-slate-100",
          name: "text-slate-800",
          badge: "bg-slate-100 text-slate-700 ring-slate-200",
          badgeSolid: "bg-slate-600 text-white",
          topAccent: "border-t-[3px] border-t-slate-500",
        },
      };

      const NEUTRAL_PARTY = {
        borderL: "border-l-slate-300",
        ring: "ring-slate-100",
        name: "text-slate-800",
        badge: "bg-slate-100 text-slate-700 ring-slate-200",
        badgeSolid: "bg-slate-600 text-white",
        topAccent: "border-t-[3px] border-t-slate-400",
      };

      function partyTheme(party) {
        return PARTY_STYLES[party] || NEUTRAL_PARTY;
      }

      function ageSummary(ageStr) {
        const s = String(ageStr || "").replace(/\n/g, " ");
        const m = s.match(/\((\d+)세\)/);
        if (m) return m[1] + "세";
        const m2 = s.match(/(\d+)세/);
        if (m2) return m2[1] + "세";
        const t = s.trim();
        return t ? t.split(/\s+/)[0] : "—";
      }

      function elide(str, max) {
        const t = String(str || "")
          .replace(/\s+/g, " ")
          .trim();
        if (!t) return "";
        if (t.length <= max) return t;
        return t.slice(0, max - 1) + "…";
      }

      function summarySnippetHtml(c) {
        const edu = String(c.education || "")
          .split("\n")
          .map((s) => s.trim())
          .filter(Boolean)[0];
        const careerLines = String(c.career || "")
          .split("\n")
          .map((s) => s.trim())
          .filter(Boolean);
        const parts = [];
        if (edu) parts.push(elide(edu, 80));
        careerLines.slice(0, 2).forEach((line) => parts.push(elide(line, 88)));
        if (!parts.length) {
          return '<p class="text-sm text-slate-400">등록된 학력·경력 요약이 없습니다.</p>';
        }
        return parts
          .slice(0, 3)
          .map(
            (p) =>
              `<p class="text-[13px] leading-relaxed text-slate-600">${escapeHtml(p)}</p>`
          )
          .join("");
      }

      let lastFilteredCandidates = [];
      let wealthPositionByKey = {};

      function normalizeWealthName(raw) {
        let s = String(raw || "").split("\n")[0].trim();
        s = s.replace(/\([^)]*\)/g, "").replace(/（[^）]*）/g, "");
        return s.replace(/\s+/g, " ").trim();
      }

      function buildWealthIndex(obj) {
        wealthPositionByKey = {};
        if (!obj || typeof obj !== "object") return;
        for (const row of Object.values(obj)) {
          if (!row || typeof row !== "object") continue;
          const d = String(row.district || "").trim();
          const n = normalizeWealthName(row.name);
          if (!d || !n) continue;
          const k = d + "|" + n;
          if (!wealthPositionByKey[k]) {
            wealthPositionByKey[k] = String(row.position || "").trim();
          }
        }
      }

      function wealthDisplayLabel(position) {
        const p = String(position || "").trim();
        if (!p) return "";
        if (p === "구의원") return "현 구의원";
        if (p === "전)구의원") return "전 구의원";
        if (p === "구청장") return "현 구청장";
        if (p === "전)구청장") return "전 구청장";
        if (p.startsWith("전)")) return "전 " + p.slice(2);
        return p;
      }

      function wealthLabelForCandidate(c) {
        const d = String(c.district || "").trim();
        const n = normalizeWealthName(c.name);
        if (!d || !n) return "";
        return wealthDisplayLabel(wealthPositionByKey[d + "|" + n]);
      }

      function wealthMatchKeyForCandidate(c) {
        const d = String(c.district || "").trim();
        const n = normalizeWealthName(c.name);
        if (!d || !n) return null;
        return { district: d, name: n };
      }

      function wealthControlsHtmlForCandidate(c) {
        const label = wealthLabelForCandidate(c);
        const key = wealthMatchKeyForCandidate(c);
        if (!label || !key) return "";
        const title =
          "이 사이트 공직자 재산 공개 명부(data.json)에 등재된 인원입니다.";
        return `<div class="mt-2 flex flex-wrap items-center gap-2">
            <span class="inline-flex max-w-full rounded-full bg-amber-50 px-2.5 py-0.5 text-[11px] font-semibold text-amber-900 ring-1 ring-amber-200/80" title="${escapeHtml(title)}">${escapeHtml(label)}</span>
            <button type="button" data-open-archive-wealth data-archive-wealth="${escapeAttr(key.name)}" data-archive-district="${escapeAttr(key.district)}" class="rounded-lg bg-amber-100 px-2.5 py-1 text-[11px] font-semibold text-amber-950 ring-1 ring-amber-300 transition hover:bg-amber-200/90">재산내역</button>
          </div>`;
      }

      function wealthModalSnippet(c) {
        const label = wealthLabelForCandidate(c);
        const key = wealthMatchKeyForCandidate(c);
        if (!label || !key) return "";
        return modalDetailRow(
          "재산 공개 명부",
          `<div class="flex flex-wrap items-center gap-2">
            <span class="inline-flex rounded-full bg-amber-50 px-2.5 py-0.5 text-xs font-semibold text-amber-900 ring-1 ring-amber-200/80">${escapeHtml(label)}</span>
            <button type="button" data-open-archive-wealth data-archive-wealth="${escapeAttr(key.name)}" data-archive-district="${escapeAttr(key.district)}" class="rounded-lg bg-amber-100 px-2.5 py-1 text-xs font-semibold text-amber-950 ring-1 ring-amber-300 transition hover:bg-amber-200/90">재산내역</button>
          </div>
          <p class="mt-2 text-xs text-slate-500">재산 공개 데이터에서 이름·자치구가 일치합니다.</p>`
        );
      }

      function modalDetailRow(label, innerHtml) {
        return `<div class="min-w-0 border-b border-slate-100 pb-3 last:border-0 last:pb-0">
          <h3 class="text-[11px] font-bold uppercase tracking-wide text-slate-400">${escapeHtml(label)}</h3>
          <div class="mt-1.5 text-sm leading-relaxed text-slate-800">${innerHtml}</div>
        </div>`;
      }

      function openCandidateModal(c) {
        const modal = document.getElementById("detailModal");
        const title = document.getElementById("detailModalTitle");
        const body = document.getElementById("detailModalBody");
        const pname = primaryName(c.name);
        const sub = subtitleName(c.name);
        const photo = c.photo ? escapeHtml(c.photo) : "";
        const t = partyTheme(c.party);
        const age = ageSummary(c.age);
        const gender = escapeHtml(c.gender || "—");
        const job = escapeHtml((c.job || "").trim() || "—");

        title.textContent = pname + " · 상세";

        const eduHtml = escapeHtml((c.education || "").trim() || "—").replace(
          /\n/g,
          "<br/>"
        );
        const carHtml = escapeHtml((c.career || "").trim() || "—").replace(
          /\n/g,
          "<br/>"
        );
        const ageHtml = escapeHtml(String(c.age || "").trim() || "—").replace(
          /\n/g,
          "<br/>"
        );

        body.innerHTML = `
          <div class="mb-5 flex gap-4">
            <img src="${photo || DEFAULT_AVATAR}" width="86" height="102" alt="" class="h-[102px] w-[86px] shrink-0 rounded-xl object-cover object-top ring-1 ring-slate-200" />
            <div class="min-w-0">
              <span class="inline-block rounded-full px-2.5 py-1 text-xs font-bold ${t.badgeSolid}">${escapeHtml(c.party || "정당 미상")}</span>
              <p class="mt-2 text-lg font-bold text-slate-900">${escapeHtml(pname)}</p>
              ${sub ? `<p class="text-sm text-slate-500">${escapeHtml(sub)}</p>` : ""}
              <p class="mt-2 text-xs text-slate-500">${escapeHtml(String(age))} · ${gender} · ${job}</p>
              <p class="mt-1 text-xs text-slate-400">${escapeHtml(c.district || "—")} · ${escapeHtml(c.constituency || "—")}</p>
            </div>
          </div>
          <div class="space-y-3">
            ${modalDetailRow("주소", escapeHtml((c.address || "").trim() || "—"))}
            ${modalDetailRow("직업", job)}
            ${modalDetailRow("학력", `<span class="whitespace-pre-line">${eduHtml}</span>`)}
            ${modalDetailRow("경력", `<span class="whitespace-pre-line">${carHtml}</span>`)}
            ${modalDetailRow("생년월일(연령)", `<span class="whitespace-pre-line">${ageHtml}</span>`)}
            ${modalDetailRow("전과 기록", formatCriminalBlock(c))}
            ${modalDetailRow("등록일자", escapeHtml(c.regDate || "—"))}
            ${wealthModalSnippet(c)}
          </div>`;

        modal.classList.remove("hidden");
        modal.classList.add("flex");
        document.body.style.overflow = "hidden";
      }

      function closeCandidateModal() {
        const modal = document.getElementById("detailModal");
        modal.classList.add("hidden");
        modal.classList.remove("flex");
        document.body.style.overflow = "";
      }

      async function shareCandidateSummary(c) {
        const pname = primaryName(c.name);
        const text = `${pname} · ${c.party || ""} · ${c.district || ""} 구의원 예비후보`;
        try {
          if (navigator.share) {
            await navigator.share({ title: pname, text });
          } else if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
            alert("후보 요약을 클립보드에 복사했습니다.");
          } else {
            prompt("복사:", text);
          }
        } catch (err) {
          if (err && err.name === "AbortError") return;
        }
      }

      function primaryName(raw) {
        if (!raw) return "";
        return String(raw).split("\n")[0].trim();
      }

      function subtitleName(raw) {
        const lines = String(raw || "").split("\n").map((s) => s.trim()).filter(Boolean);
        if (lines.length < 2) return "";
        return lines.slice(1).join(" · ");
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function escapeAttr(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function normalizeSearch(s) {
        return String(s || "")
          .toLowerCase()
          .replace(/\s+/g, "");
      }

      function parseCandidatesPayload(data) {
        if (Array.isArray(data)) {
          return { list: data, updatedAt: null };
        }
        if (
          data &&
          typeof data === "object" &&
          Array.isArray(data.candidates)
        ) {
          return {
            list: data.candidates,
            updatedAt:
              typeof data.updatedAt === "string" ? data.updatedAt : null,
          };
        }
        throw new Error(
          "JSON은 후보 배열이거나 { updatedAt, candidates } 형식이어야 합니다."
        );
      }

      function formatUpdatedAtKo(iso) {
        if (!iso) return "";
        try {
          const d = new Date(iso);
          if (Number.isNaN(d.getTime())) return "";
          return (
            "자료 갱신: " +
            new Intl.DateTimeFormat("ko-KR", {
              dateStyle: "medium",
              timeStyle: "short",
              timeZone: "Asia/Seoul",
            }).format(d)
          );
        } catch {
          return "";
        }
      }

      function setDataUpdatedLine(iso) {
        const el = document.getElementById("dataUpdatedLine");
        const text = formatUpdatedAtKo(iso);
        if (!text) {
          el.textContent = "";
          el.classList.add("hidden");
          return;
        }
        el.textContent = text;
        el.classList.remove("hidden");
      }

      let allCandidates = [];

      function fillDistrictSelect() {
        const sel = document.getElementById("district");
        SEOUL_DISTRICTS.forEach((d) => {
          const opt = document.createElement("option");
          opt.value = d;
          opt.textContent = d;
          sel.appendChild(opt);
        });
      }

      function fillPartySelect() {
        const sel = document.getElementById("party");
        const prev = sel.value;
        sel.querySelectorAll("option:not([value=''])").forEach((o) => o.remove());
        const names = new Set();
        allCandidates.forEach((c) => {
          const p = String(c.party ?? "").trim();
          if (p) names.add(p);
        });
        Array.from(names)
          .sort((a, b) => a.localeCompare(b, "ko"))
          .forEach((p) => {
            const opt = document.createElement("option");
            opt.value = p;
            opt.textContent = p;
            sel.appendChild(opt);
          });
        if (prev && [...sel.options].some((o) => o.value === prev)) sel.value = prev;
      }

      function render() {
        const district = document.getElementById("district").value;
        const party = document.getElementById("party").value;
        const q = normalizeSearch(document.getElementById("nameQuery").value);
        const list = document.getElementById("cardList");
        const countLabel = document.getElementById("countLabel");

        const filtered = allCandidates.filter((c) => {
          if (district && c.district !== district) return false;
          if (party && String(c.party ?? "").trim() !== party) return false;
          if (!q) return true;
          const hay = normalizeSearch(
            [
              c.name,
              c.party,
              c.constituency,
              c.address,
              c.job,
              c.gender,
              c.age,
              c.education,
              c.career,
              c.criminal,
              c.regDate,
            ].join(" ")
          );
          return hay.includes(q);
        });

        lastFilteredCandidates = filtered;

        const usingFilter = Boolean(district || party || q);
        countLabel.textContent = usingFilter
          ? `표시 ${filtered.length}명 / 전체 ${allCandidates.length}명`
          : `전체 ${filtered.length}명`;

        const extIcon = `<svg class="h-3.5 w-3.5 shrink-0 opacity-70" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>`;
        const shareIcon = `<svg class="h-3.5 w-3.5 shrink-0 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>`;

        list.innerHTML = filtered
          .map((c, i) => {
            const t = partyTheme(c.party);
            const pname = primaryName(c.name);
            const sub = subtitleName(c.name);
            const photo = c.photo ? escapeHtml(c.photo) : "";
            const jobShort = elide(c.job, 32) || "—";
            const necHref = c.huboId
              ? escapeHtml(necPreHuboDetailUrl(c.huboId))
              : "";
            const necLink = necHref
              ? `<a href="${necHref}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center gap-1.5 rounded-lg bg-slate-100 px-3 py-2 text-xs font-medium text-slate-700 transition hover:bg-slate-200">${extIcon}선관위 상세</a>`
              : `<span class="inline-flex cursor-not-allowed items-center gap-1.5 rounded-lg bg-slate-50 px-3 py-2 text-xs text-slate-400" title="후보 식별자가 없어 링크를 제공할 수 없습니다.">${extIcon}선관위 상세</span>`;
            const wealthControls = wealthControlsHtmlForCandidate(c);
            return `
          <li>
            <article class="flex h-full flex-col overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm transition hover:shadow-md ${t.topAccent}">
              <div class="flex gap-4 p-5">
                <div class="relative h-[102px] w-[86px] shrink-0 overflow-hidden rounded-xl bg-slate-100 ring-1 ring-slate-200/80">
                  <img
                    src="${photo || DEFAULT_AVATAR}"
                    alt="${escapeHtml(pname)} 사진"
                    width="86"
                    height="102"
                    class="h-full w-full object-cover object-top"
                    loading="lazy"
                    onerror="this.onerror=null;this.src='${DEFAULT_AVATAR}'"
                  />
                </div>
                <div class="min-w-0 flex-1">
                  <h2 class="text-xl font-bold leading-tight tracking-tight text-slate-900">${escapeHtml(pname)}</h2>
                  ${
                    sub
                      ? `<p class="mt-0.5 text-sm text-slate-500">${escapeHtml(sub)}</p>`
                      : ""
                  }
                  <div class="mt-2.5 flex flex-wrap items-center gap-x-2 gap-y-1.5">
                    <span class="inline-flex max-w-full items-center rounded-full px-2.5 py-0.5 text-xs font-bold ${t.badgeSolid}">${escapeHtml(c.party || "정당 미상")}</span>
                    <span class="text-sm text-slate-500">${escapeHtml(ageSummary(c.age))} · ${escapeHtml(c.gender || "—")} · ${escapeHtml(jobShort)}</span>
                  </div>
                  <p class="mt-2.5 inline-flex max-w-full rounded-full bg-slate-100 px-2.5 py-1 text-xs font-medium text-slate-600">
                    ${escapeHtml(c.district || "—")}<span class="mx-1 text-slate-300">·</span>${escapeHtml(c.constituency || "—")}
                  </p>
                  ${wealthControls}
                </div>
              </div>
              <div class="border-t border-slate-100 px-5 py-3.5">
                <div class="space-y-1.5">${summarySnippetHtml(c)}</div>
              </div>
              <div class="mt-auto flex flex-wrap gap-2 border-t border-slate-100 bg-slate-50/70 px-4 py-3">
                <button type="button" data-open-detail="${i}" class="rounded-lg bg-white px-3 py-2 text-xs font-medium text-slate-800 ring-1 ring-slate-200 transition hover:bg-slate-50">
                  상세 정보
                </button>
                ${necLink}
                <button type="button" data-share-idx="${i}" class="inline-flex items-center gap-1.5 rounded-lg bg-sky-50 px-3 py-2 text-xs font-medium text-sky-900 transition hover:bg-sky-100/90">
                  ${shareIcon}공유
                </button>
              </div>
            </article>
          </li>`;
          })
          .join("");
      }

      function showError(msg) {
        const box = document.getElementById("errorBox");
        box.textContent = msg;
        box.classList.remove("hidden");
      }

      fillDistrictSelect();

      document.getElementById("cardList").addEventListener("click", function (e) {
        const openBtn = e.target.closest("[data-open-detail]");
        if (openBtn) {
          const i = parseInt(openBtn.getAttribute("data-open-detail"), 10);
          if (!Number.isNaN(i) && lastFilteredCandidates[i]) {
            openCandidateModal(lastFilteredCandidates[i]);
          }
          return;
        }
        const shareBtn = e.target.closest("[data-share-idx]");
        if (shareBtn) {
          const i = parseInt(shareBtn.getAttribute("data-share-idx"), 10);
          if (!Number.isNaN(i) && lastFilteredCandidates[i]) {
            shareCandidateSummary(lastFilteredCandidates[i]);
          }
        }
      });

      document.querySelectorAll("[data-modal-close], [data-modal-backdrop]").forEach(function (el) {
        el.addEventListener("click", closeCandidateModal);
      });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") closeCandidateModal();
      });

      document.getElementById("district").addEventListener("change", render);
      document.getElementById("party").addEventListener("change", render);
      document.getElementById("nameQuery").addEventListener("input", render);

      const wealthFetch = fetch("../data.json")
        .then((r) => (r.ok ? r.json() : null))
        .catch(() => null);

      fetch("../public/data/candidates.json")
        .then((r) => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        })
        .then(async (data) => {
          const wealthData = await wealthFetch;
          buildWealthIndex(wealthData);
          const parsed = parseCandidatesPayload(data);
          allCandidates = parsed.list;
          document.getElementById("errorBox").classList.add("hidden");
          setDataUpdatedLine(parsed.updatedAt);
          fillPartySelect();
          render();
        })
        .catch((e) => {
          showError(
            "데이터를 불러오지 못했습니다. 로컬 서버로 열었는지 확인하세요. (예: 프로젝트 루트에서 npx serve . 후 /candidates/index.html) — " +
              (e && e.message ? e.message : String(e))
          );
          document.getElementById("countLabel").textContent = "0명";
        });
    </script>
  </body>
</html>
